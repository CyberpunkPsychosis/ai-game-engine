<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>刹那 TimeStop · 原型</title>
<style>
  html,body{margin:0;height:100%;background:#0a0d12;overflow:hidden;
    font-family:ui-sans-serif,system-ui,"PingFang SC","Microsoft YaHei",sans-serif;color:#eae6dd;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{background:#0d1117;max-width:100%;max-height:100%;image-rendering:auto;touch-action:none;}
  #hint{position:fixed;left:10px;bottom:8px;font-size:12px;color:#7e8896;line-height:1.5;}
  #hint b{color:#bfe3d2;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="960" height="540"></canvas></div>
<div id="hint">移动 <b>A/D</b> · 跳 <b>空格</b> · 攻击 <b>鼠标左键</b>(朝鼠标方向) · 冻住单体 <b>鼠标右键</b>(冻光标处, 花能量) · 全场定格 <b>F</b>(攒满才能放) · 重开 <b>R</b></div>
<script>
const cv=document.getElementById("c"), ctx=cv.getContext("2d");
const W=960,H=540, GROUND=H-70;
// ---------- 输入 ----------
const keys={};
let mouse={x:W/2,y:H/2,down:false};
addEventListener("keydown",e=>{keys[e.code]=true; if(["Space","KeyF","KeyR"].includes(e.code))e.preventDefault();});
addEventListener("keyup",e=>{keys[e.code]=false;});
function mpos(e){const r=cv.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);}
cv.addEventListener("mousemove",mpos);
cv.addEventListener("mousedown",e=>{mpos(e); if(e.button===0)attack(); if(e.button===2)freezeSingle();});
cv.addEventListener("contextmenu",e=>e.preventDefault());
// 手机：左半屏跳，右半屏攻击/拖动瞄准（粗略支持）
cv.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0];mpos(t);},{passive:false});

// ---------- 状态 ----------
let player, enemies, bullets, sparks, energy, ENERGY_MAX, globalFreeze, wave, killCount, shake, gameover, floatTexts;
const SINGLE_COST=22, SINGLE_DUR=2.6, FULL_DUR=3.0;
function reset(){
  player={x:160,y:GROUND-44,w:26,h:44,vx:0,vy:0,onground:false,hp:100,maxhp:100,facing:1,atk:0,atkcd:0,iframe:0};
  enemies=[];bullets=[];sparks=[];floatTexts=[];
  energy=0;ENERGY_MAX=100;globalFreeze=0;wave=0;killCount=0;shake=0;gameover=false;
  spawnWave();
}
function spawnWave(){
  wave++;
  const n=2+Math.min(4,wave);
  for(let i=0;i<n;i++){
    const type=Math.random()<0.5?"charger":(Math.random()<0.7?"shooter":"healer");
    const side=Math.random()<0.5?-1:1;
    const x=side<0? -30 - Math.random()*120 : W+30+Math.random()*120;
    spawnEnemy(type,x);
  }
}
function spawnEnemy(type,x){
  const base={x,y:GROUND-40,w:30,h:40,vx:0,vy:0,onground:false,frozen:0,fire:1+Math.random(),type,flash:0,hop:0};
  if(type==="charger"){base.hp=30;base.color="#e0633f";base.w=32;base.h=38;}
  if(type==="shooter"){base.hp=22;base.color="#c9a23f";}
  if(type==="healer"){base.hp=20;base.color="#7ac28a";base.w=26;base.h=44;}
  enemies.push(base);
}

// ---------- 玩家动作 ----------
function attack(){ if(gameover){return;} if(player.atkcd>0)return; player.atk=0.12; player.atkcd=0.32;
  player.facing = (mouse.x>=player.x)?1:-1;
  // 命中判定：身前一个框
  const ax=player.x + player.facing*34, ay=player.y, aw=46, ah=46;
  let hitAny=false;
  for(const e of enemies){ if(Math.abs(e.x-ax)<(aw/2+e.w/2) && Math.abs(e.y-ay)<(ah/2+e.h/2)){
    damage(e, 12); e.vx += player.facing*120; hitAny=true; spark(e.x,e.y,e.color);
  }}
  // 也能打掉子弹
  for(const b of bullets){ if(!b.dead && Math.abs(b.x-ax)<(aw/2+b.r) && Math.abs(b.y-ay)<(ah/2+b.r)){ b.dead=true; spark(b.x,b.y,"#ffd24a"); }}
}
function damage(e,dmg){ e.hp-=dmg; e.flash=0.1; addEnergy(6);
  if(e.hp<=0){ e.dead=true; killCount++; addEnergy(20); for(let i=0;i<8;i++)spark(e.x,e.y,e.color); floaty(e.x,e.y-20,"KILL"); }
}
function addEnergy(v){ energy=Math.min(ENERGY_MAX, energy+v); }
function freezeSingle(){ if(gameover){return;} if(energy<SINGLE_COST)return;
  // 冻住离光标最近的(敌人或子弹)
  let best=null,bd=240,kind=null;
  for(const e of enemies){const d=Math.hypot(e.x-mouse.x,e.y-mouse.y); if(d<bd){bd=d;best=e;kind="e";}}
  for(const b of bullets){if(b.dead)continue;const d=Math.hypot(b.x-mouse.x,b.y-mouse.y); if(d<bd){bd=d;best=b;kind="b";}}
  if(best){ energy-=SINGLE_COST; best.frozen=SINGLE_DUR; floaty(best.x,best.y-20,"冻"); }
}
function fullFreeze(){ if(gameover){return;} if(energy<ENERGY_MAX)return; energy=0; globalFreeze=FULL_DUR; shake=14; }

function spark(x,y,c){ for(let i=0;i<5;i++)sparks.push({x,y,vx:(Math.random()-.5)*220,vy:(Math.random()-.7)*220,life:0.4,c}); }
function floaty(x,y,t){ floatTexts.push({x,y,t,life:0.7}); }

// ---------- 更新 ----------
let last=performance.now();
function update(dt){
  if(keys.KeyR){reset();keys.KeyR=false;}
  if(gameover)return;
  if(keys.KeyF){ fullFreeze(); keys.KeyF=false; }
  globalFreeze=Math.max(0,globalFreeze-dt);
  const worldFrozen = globalFreeze>0;

  // --- 玩家(永远实时) ---
  const move=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0);
  player.vx = move*250;
  if((keys.Space||keys.KeyW||keys.ArrowUp) && player.onground){ player.vy=-560; player.onground=false; }
  player.vy += 1500*dt;
  player.x += player.vx*dt; player.y += player.vy*dt;
  player.atk=Math.max(0,player.atk-dt); player.atkcd=Math.max(0,player.atkcd-dt); player.iframe=Math.max(0,player.iframe-dt);
  // 地面 + 站在被冻住的实体上
  player.onground=false;
  if(player.y+player.h/2>=GROUND){ player.y=GROUND-player.h/2; player.vy=0; player.onground=true; }
  for(const e of enemies){ if((e.frozen>0||worldFrozen)){ landOn(player,e.x,e.y,e.w,e.h); } }
  for(const b of bullets){ if(!b.dead&&(b.frozen>0||worldFrozen)){ landOn(player,b.x,b.y,b.r*2,b.r*2); } }
  player.x=Math.max(14,Math.min(W-14,player.x));

  // --- 敌人 ---
  for(const e of enemies){
    e.flash=Math.max(0,e.flash-dt);
    if(e.frozen>0){ e.frozen-=dt; continue; }      // 单体冻结
    if(worldFrozen) continue;                       // 全场定格
    // 重力
    e.vy += 1500*dt; e.y += e.vy*dt;
    if(e.y+e.h/2>=GROUND){e.y=GROUND-e.h/2;e.vy=0;e.onground=true;}
    const dir=Math.sign(player.x-e.x)||1;
    if(e.type==="charger"){ e.x += dir*150*dt; e.x+=e.vx*dt; e.vx*=0.9;
      if(Math.abs(e.x-player.x)<28 && Math.abs(e.y-player.y)<40) hurtPlayer(12);
    }
    if(e.type==="shooter"){ // 保持距离 + 开火
      const dist=Math.abs(e.x-player.x);
      if(dist<260) e.x -= dir*70*dt; else if(dist>360) e.x += dir*60*dt;
      e.fire-=dt; if(e.fire<=0){ e.fire=1.6; const a=Math.atan2(player.y-e.y,player.x-e.x);
        bullets.push({x:e.x,y:e.y,vx:Math.cos(a)*260,vy:Math.sin(a)*260,r:7,frozen:0,life:4,dead:false}); }
    }
    if(e.type==="healer"){ // 躲玩家 + 给别人加血
      e.x -= dir*40*dt;
      e.fire-=dt; if(e.fire<=0){ e.fire=1.4; for(const o of enemies){ if(o!==e&&!o.dead&&o.hp<( o.type==="charger"?30:22)){ o.hp+=4; floaty(o.x,o.y-24,"+"); } } }
    }
    e.x=Math.max(-160,Math.min(W+160,e.x));
  }
  enemies=enemies.filter(e=>!e.dead);

  // --- 子弹 ---
  for(const b of bullets){ if(b.dead)continue;
    if(b.frozen>0){ b.frozen-=dt; continue; }
    if(worldFrozen) continue;
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) b.dead=true;
    if(Math.abs(b.x-player.x)<16 && Math.abs(b.y-player.y)<22){ b.dead=true; hurtPlayer(8); }
  }
  bullets=bullets.filter(b=>!b.dead);

  // 火花/文字/震屏
  for(const s of sparks){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=600*dt; s.life-=dt; }
  sparks=sparks.filter(s=>s.life>0);
  for(const f of floatTexts){ f.y-=30*dt; f.life-=dt; }
  floatTexts=floatTexts.filter(f=>f.life>0);
  shake=Math.max(0,shake-dt*30);

  if(enemies.length===0) spawnWave();
  if(player.hp<=0) gameover=true;
}
function landOn(p,bx,by,bw,bh){
  if(p.vy>=0){ const top=by-bh/2;
    if(p.x+p.w/2>bx-bw/2 && p.x-p.w/2<bx+bw/2 && p.y+p.h/2>=top && p.y+p.h/2<=top+20){
      p.y=top-p.h/2; p.vy=0; p.onground=true; } }
}
function hurtPlayer(d){ if(player.iframe>0)return; player.hp-=d; player.iframe=0.6; shake=Math.max(shake,8); }

// ---------- 渲染 ----------
function render(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  ctx.fillStyle="#0d1117";ctx.fillRect(-20,-20,W+40,H+40);
  // 背景网格
  ctx.strokeStyle="#141b22";for(let x=0;x<W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  // 地面
  ctx.fillStyle="#1b232c";ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle="#2c3a46";ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();

  const worldFrozen=globalFreeze>0;
  // 子弹
  for(const b of bullets){ const fz=b.frozen>0||worldFrozen;
    ctx.fillStyle=fz?"#8fd3ff":"#ffce5a"; ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
    if(fz){ctx.strokeStyle="#cfeeff";ctx.lineWidth=1.5;ctx.stroke();} }
  // 敌人
  for(const e of enemies){ const fz=e.frozen>0||worldFrozen;
    ctx.fillStyle = e.flash>0?"#ffffff":(fz?"#6aa9d6":e.color);
    ctx.fillRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);
    if(fz){ctx.strokeStyle="#cfeeff";ctx.lineWidth=2;ctx.strokeRect(e.x-e.w/2,e.y-e.h/2,e.w,e.h);}
    // 血条
    const mh=e.type==="charger"?30:22; ctx.fillStyle="#000a";ctx.fillRect(e.x-15,e.y-e.h/2-9,30,4);
    ctx.fillStyle="#e06b6b";ctx.fillRect(e.x-15,e.y-e.h/2-9,30*Math.max(0,e.hp/mh),4);
    if(e.type==="healer"){ctx.fillStyle="#bfe3d2";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText("治疗",e.x,e.y+3);}
  }
  // 玩家
  ctx.fillStyle = player.iframe>0 && Math.floor(player.iframe*20)%2? "#88e0ff":"#5cc0cc";
  ctx.fillRect(player.x-player.w/2,player.y-player.h/2,player.w,player.h);
  // 攻击框
  if(player.atk>0){ const ax=player.x+player.facing*34;
    ctx.fillStyle="rgba(255,255,255,.5)";ctx.fillRect(ax-23,player.y-23,46,46); }
  // 火花
  for(const s of sparks){ ctx.fillStyle=s.c;ctx.globalAlpha=Math.max(0,s.life*2.2);ctx.fillRect(s.x-2,s.y-2,4,4);ctx.globalAlpha=1; }
  // 飘字
  for(const f of floatTexts){ ctx.fillStyle="rgba(255,255,255,"+Math.min(1,f.life*1.6)+")";ctx.font="bold 14px sans-serif";ctx.textAlign="center";ctx.fillText(f.t,f.x,f.y); }
  // 光标(冻结瞄准)
  ctx.strokeStyle=energy>=SINGLE_COST?"#8fd3ff":"#445";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(mouse.x,mouse.y,10,0,7);ctx.stroke();
  ctx.restore();

  // 全场定格滤镜
  if(worldFrozen){ ctx.fillStyle="rgba(120,180,255,0.12)";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(143,211,255,.9)";ctx.font="bold 26px sans-serif";ctx.textAlign="center";
    ctx.fillText("⏸ 时间静止 "+globalFreeze.toFixed(1),W/2,46); }

  // HUD
  // 能量条
  ctx.fillStyle="#000a";ctx.fillRect(14,14,220,16);
  ctx.fillStyle=energy>=ENERGY_MAX?"#8fd3ff":"#5c8fcc";ctx.fillRect(14,14,220*(energy/ENERGY_MAX),16);
  ctx.strokeStyle="#456";ctx.strokeRect(14,14,220,16);
  ctx.fillStyle="#cdd6df";ctx.font="11px sans-serif";ctx.textAlign="left";
  ctx.fillText(energy>=ENERGY_MAX?"能量满! 按F全场定格":"时间能量(打怪攒/冻结花)",16,44);
  // 血
  ctx.fillStyle="#000a";ctx.fillRect(14,52,220,14);
  ctx.fillStyle="#e0633f";ctx.fillRect(14,52,220*Math.max(0,player.hp/player.maxhp),14);
  ctx.strokeStyle="#456";ctx.strokeRect(14,52,220,14);
  ctx.fillStyle="#cdd6df";ctx.textAlign="right";ctx.fillText("击杀 "+killCount+"   波次 "+wave,W-14,28);

  if(gameover){ ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#eae6dd";ctx.font="bold 34px sans-serif";ctx.textAlign="center";ctx.fillText("阵亡",W/2,H/2-10);
    ctx.font="16px sans-serif";ctx.fillText("击杀 "+killCount+" · 波次 "+wave+" —— 按 R 重来",W/2,H/2+24); }
}

function loop(now){ const dt=Math.min(0.033,(now-last)/1000); last=now; update(dt); render(); requestAnimationFrame(loop); }
reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
