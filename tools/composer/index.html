<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>关卡编辑器 · 自由＋瓦片 · AI Game Engine</title>
<style>
  :root{
    --ink:#eae6dd; --muted:#9a958a; --panel:#1d2226; --panel2:#262c31;
    --line:#333b41; --clay:#cc785c; --accent:#5cc0cc; --sel:#ffd24a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#11151a;color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    user-select:none;-webkit-user-select:none;}
  #stage{position:fixed;inset:0;touch-action:none;display:block;}
  /* top bar */
  .topbar{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;gap:6px;
    padding:0 8px;background:rgba(20,25,29,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:20;}
  .topbar .title{font-size:14px;font-weight:700;margin-right:auto;}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:9px;
    padding:8px 10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn:active{background:#30373d;}
  .btn.p{background:var(--clay);border-color:var(--clay);}
  .btn.sm{padding:7px 9px;font-size:12px;}
  /* layer tabs */
  .layers{position:fixed;top:48px;left:0;right:0;height:38px;display:flex;gap:0;z-index:19;
    background:rgba(20,25,29,.9);border-bottom:1px solid var(--line);}
  .layers .lt{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
    color:var(--muted);border-right:1px solid var(--line);cursor:pointer;gap:5px;}
  .layers .lt.active{color:var(--ink);background:var(--panel2);box-shadow:inset 0 -2px 0 var(--accent);}
  .layers .lt small{font-size:10px;color:var(--muted);}
  /* bottom palette */
  .palette{position:fixed;left:0;right:0;bottom:0;height:128px;background:rgba(20,25,29,.96);
    border-top:1px solid var(--line);z-index:18;display:flex;flex-direction:column;transition:transform .2s;}
  .palette.hidden{transform:translateY(128px);}
  .cats{display:flex;gap:6px;overflow-x:auto;padding:6px 8px;border-bottom:1px solid var(--line);}
  .cat{padding:5px 9px;font-size:12px;border-radius:7px;background:var(--panel2);color:var(--muted);
    white-space:nowrap;cursor:pointer;border:1px solid transparent;}
  .cat.active{color:var(--ink);border-color:var(--accent);}
  .pieces{display:flex;gap:6px;overflow-x:auto;padding:8px;flex:1;align-items:center;}
  .pc{flex:0 0 auto;width:76px;height:76px;background:#0d1115;border:1px solid var(--line);border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;padding:4px;}
  .pc img{max-width:100%;max-height:100%;image-rendering:auto;}
  /* selection action bar */
  .actions{position:fixed;left:0;right:0;bottom:0;z-index:21;display:none;gap:6px;flex-wrap:wrap;
    padding:8px;background:rgba(20,25,29,.97);border-top:1px solid var(--line);justify-content:center;}
  .actions.show{display:flex;}
  .actions .btn{flex:0 0 auto;}
  /* generic panel */
  .panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(420px,92vw);
    max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;z-index:40;display:none;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .panel.show{display:block;}
  .panel h3{margin:0 0 12px;font-size:15px;}
  .row{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:13px;}
  .row label{flex:0 0 92px;color:var(--muted);}
  .row input[type=range]{flex:1;}
  .row input[type=color]{width:42px;height:30px;border:none;background:none;}
  .row input[type=text],.row select{flex:1;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:8px;padding:8px;font-size:13px;}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none;}
  .scrim.show{display:block;}
  .hint{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);
    color:#fff;font-size:12px;padding:6px 12px;border-radius:20px;z-index:15;pointer-events:none;opacity:0;transition:opacity .3s;}
  .hint.show{opacity:1;}
  .menu{position:fixed;top:54px;right:8px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:6px;z-index:30;display:none;flex-direction:column;gap:4px;min-width:150px;}
  .menu.show{display:flex;}
  .menu .btn{text-align:left;border:none;background:none;}
  .menu .btn:active{background:var(--panel2);}
  .toggle{display:flex;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .toggle button{flex:1;border:none;background:none;color:var(--muted);padding:7px;font-size:12px;font-weight:600;}
  .toggle button.on{background:var(--accent);color:#04222a;}
  /* 模式切换(自由/瓦片) */
  .modesw{display:flex;background:var(--panel2);border-radius:8px;overflow:hidden;border:1px solid var(--line);margin-right:4px;}
  .modesw button{border:none;background:none;color:var(--muted);padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .modesw button.on{background:var(--clay);color:#fff;}
  /* 瓦片工具条 */
  .tilebar{position:fixed;top:86px;left:0;right:0;height:40px;display:none;align-items:center;gap:6px;
    padding:0 8px;background:rgba(26,32,37,.95);border-bottom:1px solid var(--line);z-index:17;overflow-x:auto;}
  .tilebar.show{display:flex;}
  .tilebar .bchip{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:3px 6px;font-size:12px;color:var(--muted);white-space:nowrap;}
  .tilebar .bchip img{width:30px;height:30px;object-fit:contain;image-rendering:pixelated;background:#0d1115;border-radius:4px;}
  .tilebar .btn.sm{padding:6px 8px;}
  .pc.tilekind{outline:2px solid var(--accent);outline-offset:-2px;}
  .pc .tag{position:absolute;top:2px;left:2px;background:var(--accent);color:#04222a;font-size:9px;font-weight:700;
    padding:1px 4px;border-radius:4px;}
  .pc{position:relative;}
  /* 取块面板 */
  #cropPanel canvas{max-width:100%;background:#0d1115;border:1px solid var(--line);border-radius:8px;touch-action:none;display:block;margin:8px auto;}
  /* 右侧刷库竖排 */
  #libDock{position:fixed;top:128px;right:0;bottom:0;width:88px;background:rgba(20,25,29,.97);
    border-left:1px solid var(--line);z-index:22;display:none;flex-direction:column;}
  #libDock.show{display:flex;}
  #libDock .libgrip{position:absolute;left:-5px;top:0;bottom:0;width:10px;cursor:ew-resize;z-index:1;}
  #libDock .libgrip::after{content:"";position:absolute;left:3px;top:50%;width:3px;height:36px;margin-top:-18px;background:var(--line);border-radius:2px;}
  #libList{flex-direction:row;flex-wrap:wrap;}
  #libDock .libhdr{display:flex;align-items:center;gap:4px;padding:6px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;}
  #libDock .libhdr span{margin-right:auto;}
  #libDock .libhdr button{border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    border-radius:6px;width:22px;height:22px;line-height:1;padding:0;cursor:pointer;font-weight:700;}
  #libList{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:8px;align-items:center;}
  #libList .libcard{position:relative;width:72px;text-align:center;}
  #libList canvas{width:64px;height:64px;background:#0d1115;border:1px solid var(--line);border-radius:8px;image-rendering:pixelated;cursor:pointer;}
  #libList .libcard.cur canvas{outline:2px solid var(--accent);}
  #libList .delx{position:absolute;top:-7px;right:-1px;width:20px;height:20px;line-height:1;padding:0;border-radius:50%;
    border:1px solid var(--line);background:#30373d;color:#fff;cursor:pointer;}
  #libList .nm{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="topbar">
  <div class="title">关卡编辑器</div>
  <div class="modesw" id="modesw">
    <button data-m="free" class="on">自由摆放</button>
    <button data-m="tile">瓦片铺</button>
  </div>
  <button class="btn sm" id="btnHome">主视角</button>
  <button class="btn sm" id="btnMarker">标记</button>
  <button class="btn sm" id="btnPlay">▶ 预览</button>
  <button class="btn sm p" id="btnMenu">⋯</button>
</div>

<div class="layers" id="layers"></div>

<!-- 瓦片模式工具条 -->
<div class="tilebar" id="tilebar">
  <span class="bchip" id="brushChip"><span style="color:var(--muted)">未选瓦片</span></span>
  <button class="btn sm" data-t="scaleDn">－</button>
  <span id="tileScaleV" style="font-size:12px;color:var(--muted);min-width:34px;text-align:center">1.5×</span>
  <button class="btn sm" data-t="scaleUp">＋</button>
  <button class="btn sm p" id="btnGrid" data-t="grid">网格:32px</button>
  <button class="btn sm" id="btnErase" data-t="erase">🧹 擦除</button>
  <button class="btn sm" id="btnCrop" data-t="crop">✂ 取块</button>
  <button class="btn sm" id="btnLib" data-t="lib">★ 刷库</button>
  <span style="font-size:11px;color:var(--muted);white-space:nowrap">单指铺 · 右键擦 · 双指平移/缩放</span>
</div>

<div class="menu" id="menu">
  <button class="btn" id="mNew">🆕 新建空场景</button>
  <button class="btn" id="mBg">🎨 背景与雾</button>
  <button class="btn" id="mSave">💾 保存到仓库</button>
  <button class="btn" id="mLoad">📂 从仓库读取</button>
  <button class="btn" id="mExport">⬇ 导出 JSON</button>
  <button class="btn" id="mImport">⬆ 导入 JSON</button>
  <button class="btn" id="mPng">🖼 导出预览图</button>
</div>

<div class="hint" id="hint"></div>

<!-- palette -->
<div class="palette" id="palette">
  <div class="cats" id="cats"></div>
  <div class="pieces" id="pieces"></div>
</div>

<!-- selection actions -->
<div class="actions" id="actions">
  <button class="btn sm" data-a="scaleUp">放大＋</button>
  <button class="btn sm" data-a="scaleDn">缩小－</button>
  <button class="btn sm" data-a="rotL">↺</button>
  <button class="btn sm" data-a="rotR">↻</button>
  <button class="btn sm" data-a="flip">翻转</button>
  <button class="btn sm p" data-a="fill">铺满可视区</button>
  <button class="btn sm" data-a="layer">层↔</button>
  <button class="btn sm" data-a="front">置顶</button>
  <button class="btn sm" data-a="back">置底</button>
  <button class="btn sm" data-a="dup">复制</button>
  <button class="btn sm" data-a="del">🗑删除</button>
  <button class="btn sm p" data-a="done">完成</button>
</div>

<!-- bg panel -->
<div class="scrim" id="scrim"></div>
<div class="panel" id="bgPanel">
  <h3>背景与雾 · 可视区</h3>
  <div class="row"><label>可视高度</label><input type="range" id="vH" min="400" max="2000"><span id="vHV" style="color:var(--muted)"></span></div>
  <div class="row"><label>地面线</label><input type="range" id="vG" min="200" max="2000"><span id="vGV" style="color:var(--muted)"></span></div>
  <div class="row"><label>顶部颜色</label><input type="color" id="bgTop"><span id="bgTopV" style="color:var(--muted)"></span></div>
  <div class="row"><label>底部颜色</label><input type="color" id="bgBot"><span id="bgBotV" style="color:var(--muted)"></span></div>
  <div class="row"><label>雾颜色</label><input type="color" id="bgFog"></div>
  <div class="row"><label>雾浓度</label><input type="range" id="bgFogA" min="0" max="100"><span id="bgFogAV" style="color:var(--muted)"></span></div>
  <div class="row"><label>萤火虫</label><input type="range" id="bgFire" min="0" max="120"><span id="bgFireV" style="color:var(--muted)"></span></div>
  <button class="btn p" id="bgClose" style="width:100%;margin-top:8px">完成</button>
</div>

<!-- marker palette -->
<div class="panel" id="markPanel">
  <h3>放置标记（点画布放下）</h3>
  <div class="row"><label>类型</label>
    <select id="markType">
      <option value="spawn">出生点 spawn</option>
      <option value="enemy">敌人 enemy</option>
      <option value="exit">出口 exit</option>
      <option value="hazard">机关 hazard</option>
    </select>
  </div>
  <button class="btn p" id="markClose" style="width:100%;margin-top:8px">开始放置</button>
</div>

<!-- save panel -->
<div class="panel" id="savePanel">
  <h3>保存到仓库</h3>
  <div class="row"><label>场景名</label><input type="text" id="saveName" placeholder="level1"></div>
  <div class="row"><label>GitHub 令牌</label><input type="text" id="saveTok" placeholder="自动用上传页存的" autocomplete="off"></div>
  <div id="saveLog" style="font-size:12px;color:var(--muted);margin:8px 0;white-space:pre-wrap"></div>
  <button class="btn p" id="saveGo" style="width:100%">提交到 scenes/</button>
  <button class="btn" id="saveCancel" style="width:100%;margin-top:6px">取消</button>
</div>

<!-- load panel -->
<div class="panel" id="loadPanel">
  <h3>从仓库读取</h3>
  <div id="loadList" style="font-size:13px"></div>
  <button class="btn" id="loadCancel" style="width:100%;margin-top:10px">取消</button>
</div>

<!-- 取块面板 -->
<div class="panel" id="cropPanel">
  <h3>取块 · 点格子拿来铺</h3>
  <div style="font-size:12px;color:var(--muted);margin-bottom:6px">选一张素材 → <b>点一格 = 拿来铺</b>；拖几格 = 拿一整块。网格大小用下面按钮。</div>
  <div class="cats" id="cropCats" style="border:none;padding:4px 0"></div>
  <div class="row" id="cropGridRow" style="flex-wrap:wrap;gap:5px;margin:4px 0">
    <label style="flex:0 0 auto;color:var(--muted)">格子</label>
    <button class="btn sm" data-g="16">16</button>
    <button class="btn sm" data-g="24">24</button>
    <button class="btn sm" data-g="32">32</button>
    <button class="btn sm" data-g="48">48</button>
    <button class="btn sm" data-g="64">64</button>
  </div>
  <canvas id="cropCv" width="300" height="300"></canvas>
  <div id="cropInfo" style="font-size:12px;color:var(--muted);text-align:center"></div>
  <button class="btn" id="cropSaveAll" style="width:100%;margin-top:8px">★ 全部格子 → 刷库</button>
  <button class="btn" id="cropCancel" style="width:100%;margin-top:6px">取消</button>
</div>

<!-- 瓦片刷库：右侧常驻竖排(可拉宽) -->
<div id="libDock">
  <div class="libgrip" id="libGrip" title="拖动改变宽度"></div>
  <div class="libhdr"><span>★ 刷库</span>
    <button id="libAdd" title="收藏当前刷子">＋</button>
    <button id="libClear" title="一键清空">🗑</button>
    <button id="libDockClose" title="收起">×</button></div>
  <div id="libList"></div>
</div>

<input type="file" id="fileIn" accept="application/json" style="display:none">

<script>
//==================== 配置 ====================
const OWNER="CyberpunkPsychosis", REPO="ai-game-engine";
// 保存写入的分支（= 当前开发分支，和 Pages 部署同源一致）
const BRANCH="claude/game-engine-claude-chat-mbKeN";
// 素材与场景同源加载（构建时拷进 build/web）—— 读取不需要令牌
const ASSET_BASE="../../assets/packs/anokolisa/";
const ANIM_BASE="../../assets/anim/";
const SCENE_BASE="../../scenes/";
const PARALLAX={far:0.30, back:0.60, play:1.00, fore:1.18};
const LAYER_DEF=[
  {id:"far",  name:"远景"},
  {id:"back", name:"中背景"},
  {id:"play", name:"可玩层"},
  {id:"fore", name:"前景"},
];
const MARK_COLOR={spawn:"#46d160",enemy:"#ff5a5a",exit:"#5cc0cc",hazard:"#ffb02e"};
const MARK_LABEL={spawn:"S",enemy:"E",exit:"X",hazard:"!"};

//==================== 状态 ====================
const cv=document.getElementById("stage"), ctx=cv.getContext("2d");
let DPR=Math.min(window.devicePixelRatio||1,2);
let manifest=null;
let PAL=[];                        // 统一调色板分类 [{name,key,anim,items}]
const ANIM={};                    // clipName -> {file,fw,fh,count,cols,fps,role}
const imgCache=new Map();          // url -> {img, loaded}
let scene=blankScene();
let cam={x:0,y:0,zoom:0.5};
let curLayer="play";
let sel=null;                      // selected instance id
let mode="edit";                   // edit | marker | play
let markType="spawn";
let palCat=null;
let t0=performance.now();
// 瓦片模式
let placeMode="free";          // free | tile
let brush=null;                // {asset, crop:[x,y,w,h]|null, w, h}
let tileScale=1.5;
let eraseMode=false;
let painting=false;
let lastCell=null;             // 防止同格重复盖
let sheet=null;               // 贴在画布上的取块板 {file,img,scale,sx,sy,sel:[x,y,w,h]|null}

function blankScene(){
  const h=1400;
  return {
    version:1, name:"untitled",
    world:{width:4000,height:h},
    // 玩家相机：纵向可视高度 h，groundY=可视区底部(地面线)
    view:{h:Math.round(h*0.72), groundY:h-100},
    background:{top:"#0a1018",bottom:"#10202c",fog:"#10202c",fogA:0.12,fireflies:0},
    instances:[], markers:[]
  };
}

//==================== 工具 ====================
const $=id=>document.getElementById(id);
function showHint(t){const h=$("hint");h.textContent=t;h.classList.add("show");clearTimeout(h._t);h._t=setTimeout(()=>h.classList.remove("show"),1400);}
function uid(){return Math.random().toString(36).slice(2,9);}
function hexA(hex,a){const c=hex.replace("#","");const n=parseInt(c.length===3?c.replace(/(.)/g,"$1$1"):c,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function layerIndex(id){return LAYER_DEF.findIndex(l=>l.id===id);}
function parallaxOf(id){return PARALLAX[id]??1;}

function getImg(url){
  let e=imgCache.get(url);
  if(e) return e;
  e={img:new Image(),loaded:false};
  e.img.crossOrigin="anonymous";
  e.img.onload=()=>{e.loaded=true;};
  e.img.src=url;
  imgCache.set(url,e);
  return e;
}

// 取实例的源图与裁剪信息（支持 crop 取块）
function srcDims(ins){
  if(ins.anim){
    const c=ANIM[ins.anim];
    return {url:ANIM_BASE+c.file, fw:c.fw, fh:c.fh, sx:0, sy:0, sw:c.fw, sh:c.fh, anim:c};
  }
  const e=getImg(ASSET_BASE+ins.asset);
  if(ins.crop){const[cx,cy,cw,ch]=ins.crop;return {e,url:ASSET_BASE+ins.asset,fw:cw,fh:ch,sx:cx,sy:cy,sw:cw,sh:ch};}
  const nw=e.loaded?e.img.naturalWidth:64, nh=e.loaded?e.img.naturalHeight:64;
  return {e,url:ASSET_BASE+ins.asset,fw:nw,fh:nh,sx:0,sy:0,sw:nw,sh:nh};
}

// 世界<->屏幕（按图层视差）
function worldToScreen(wx,wy,p){
  return [(wx-cam.x*p)*cam.zoom, (wy-cam.y*p)*cam.zoom];
}
function screenToWorld(sx,sy,p){
  return [sx/cam.zoom+cam.x*p, sy/cam.zoom+cam.y*p];
}

//==================== 画布尺寸 ====================
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  cv.width=innerWidth*DPR; cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px";
}
addEventListener("resize",resize); resize();

//==================== 渲染 ====================
function draw(){
  const t=(performance.now()-t0)/1000;
  const W=cv.width,H=cv.height;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const w=innerWidth,h=innerHeight;
  ctx.imageSmoothingEnabled=false;          // 像素画:关插值,瓦片边缘不发虚/不露缝
  // 背景渐变
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,scene.background.top);
  g.addColorStop(1,scene.background.bottom);
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h);

  // 实例：按图层(远->近)再按数组序
  const order=[...scene.instances].sort((a,b)=>
    layerIndex(a.layer)-layerIndex(b.layer) || (a.z||0)-(b.z||0));
  for(const ins of order){
    const p=parallaxOf(ins.layer);
    const [sx,sy]=worldToScreen(ins.x,ins.y,p);
    const isAnim=!!ins.anim;
    let e,fw,fh,srcx=0,srcy=0;
    if(isAnim){
      const clip=ANIM[ins.anim];if(!clip)continue;
      e=getImg(ANIM_BASE+clip.file);fw=clip.fw;fh=clip.fh;
      const fps=ins.fps||clip.fps;
      const fi=Math.floor(t*fps)%clip.count;
      srcx=(fi%clip.cols)*fw;srcy=Math.floor(fi/clip.cols)*fh;
    }else{
      const d=srcDims(ins);e=d.e;fw=d.fw;fh=d.fh;srcx=d.sx;srcy=d.sy;
    }
    const iw=fw*ins.scale*cam.zoom, ih=fh*ins.scale*cam.zoom;
    ctx.save();
    ctx.globalAlpha=ins.opacity==null?1:ins.opacity;
    ctx.translate(Math.round(sx),Math.round(sy));    // 整数像素,避免半像素接缝
    ctx.rotate((ins.rot||0)*Math.PI/180);
    if(ins.flipX) ctx.scale(-1,1);
    if(e.loaded){
      // 瓦片向外多铺 1px(屏幕),让相邻块叠住,彻底消缝
      const bl=ins.tile?1:0;
      const dw=Math.ceil(iw)+bl*2, dh=Math.ceil(ih)+bl*2;
      ctx.drawImage(e.img,srcx,srcy,fw,fh,-Math.round(iw/2)-bl,-Math.round(ih/2)-bl,dw,dh);
    }else{ctx.fillStyle="#333";ctx.fillRect(-iw/2,-ih/2,iw,ih);}
    ctx.restore();
    // 选中描边 + 右下角缩放手柄(拖它改大小)
    if(ins.id===sel){
      ctx.save();ctx.translate(sx,sy);ctx.rotate((ins.rot||0)*Math.PI/180);
      ctx.strokeStyle="#ffd24a";ctx.lineWidth=2;ctx.setLineDash([6,4]);
      ctx.strokeRect(-iw/2,-ih/2,iw,ih);
      ctx.setLineDash([]);ctx.fillStyle="#ffd24a";ctx.strokeStyle="#04222a";
      ctx.beginPath();ctx.arc(iw/2,ih/2,11,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.restore();
    }
  }

  // 大气雾（垂直渐变，营造纵深朦胧）
  if(scene.background.fogA>0){
    const fg=ctx.createLinearGradient(0,0,0,h);
    const fa=scene.background.fogA;
    fg.addColorStop(0,hexA(scene.background.fog,0));
    fg.addColorStop(0.55,hexA(scene.background.fog,fa));
    fg.addColorStop(1,hexA(scene.background.fog,fa*0.55));
    ctx.fillStyle=fg;ctx.fillRect(0,0,w,h);
  }

  // 发光孢子（叠加发光）
  const N=scene.background.fireflies|0;
  ctx.globalCompositeOperation="lighter";
  for(let i=0;i<N;i++){
    const fx=(Math.sin(i*12.9+t*0.13)*0.5+0.5)*w;
    const fy=(Math.cos(i*7.7+t*0.1)*0.5+0.5)*h;
    const a=0.25+0.35*Math.sin(t*1.8+i);
    const r=1.4+1.2*(0.5+0.5*Math.sin(i));
    const gl=ctx.createRadialGradient(fx,fy,0,fx,fy,r*5);
    gl.addColorStop(0,`rgba(200,255,210,${a})`);
    gl.addColorStop(1,"rgba(200,255,210,0)");
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(fx,fy,r*5,0,7);ctx.fill();
  }
  ctx.globalCompositeOperation="source-over";
  ctx.globalAlpha=1;

  // 标记
  for(const m of scene.markers){
    const [sx,sy]=worldToScreen(m.x,m.y,1);
    ctx.fillStyle=MARK_COLOR[m.type]||"#fff";
    ctx.beginPath();ctx.arc(sx,sy,12,0,7);ctx.fill();
    ctx.fillStyle="#04222a";ctx.font="bold 13px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(MARK_LABEL[m.type]||"?",sx,sy);
    if(m===selMarker){ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,15,0,7);ctx.stroke();}
  }

  // 世界边界
  ctx.strokeStyle="rgba(255,255,255,.08)";ctx.lineWidth=1;
  const [bx0,by0]=worldToScreen(0,0,1);
  const [bx1,by1]=worldToScreen(scene.world.width,scene.world.height,1);
  ctx.strokeRect(bx0,by0,bx1-bx0,by1-by0);

  // 主视角可视区参考（play 模式不画——那时整屏≈玩家所见）
  if(mode!=="play"){
    const vTop=scene.view.groundY-scene.view.h, vBot=scene.view.groundY;
    const syTop=(vTop-cam.y)*cam.zoom, syBot=(vBot-cam.y)*cam.zoom;
    ctx.fillStyle="rgba(0,0,0,.34)";
    if(syTop>0)ctx.fillRect(0,0,w,Math.min(syTop,h));
    if(syBot<h)ctx.fillRect(0,Math.max(0,syBot),w,h-Math.max(0,syBot));
    // 画面上下边参考(低调青色虚线;不代表硬地面)
    ctx.strokeStyle="rgba(92,192,204,.7)";ctx.lineWidth=1.5;ctx.setLineDash([10,6]);
    ctx.beginPath();ctx.moveTo(0,syTop);ctx.lineTo(w,syTop);
    ctx.moveTo(0,syBot);ctx.lineTo(w,syBot);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="rgba(140,220,230,.8)";ctx.font="11px sans-serif";ctx.textAlign="left";
    ctx.textBaseline="top";ctx.fillText("▲ 画面顶边",8,Math.max(2,syTop+4));
    ctx.textBaseline="bottom";ctx.fillText("▼ 画面底边",8,Math.min(h-2,syBot-4));
  }

  // 瓦片网格 + 落点高亮(进瓦片模式即显示,不必先选刷子)
  if(placeMode==="tile" && mode!=="play"){
    const s=gridStepWorld(); const c={w:s,h:s}; const p=parallaxOf(curLayer);
    const cw=c.w*cam.zoom, ch=c.h*cam.zoom;
    if(cw>6 && ch>6){
      ctx.strokeStyle="rgba(255,210,74,.28)";ctx.lineWidth=1;
      // 竖线
      const wxL=cam.x*p, wxR=wxL+w/cam.zoom;
      let col0=Math.floor(wxL/c.w);
      for(let col=col0; col*c.w<wxR+c.w; col++){
        const sx=(col*c.w-cam.x*p)*cam.zoom;
        ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,h);ctx.stroke();
      }
      // 横线(从地面线向上下)
      const gy=scene.view.groundY;
      for(let row=-6; row*c.h<(h/cam.zoom); row++){
        const sy=((gy-row*c.h)-cam.y*p)*cam.zoom;
        if(sy<-ch||sy>h+ch)continue;
        ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(w,sy);ctx.stroke();
      }
      // 地面线高亮
      const syG=(gy-cam.y*p)*cam.zoom;
      ctx.strokeStyle="rgba(255,210,74,.6)";ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,syG);ctx.lineTo(w,syG);ctx.stroke();
      // 鼠标落点(画瓦片真实footprint,而非格子,便于看大块怎么落)
      if(hoverCell && brush){
        const tw=(hoverCell.tw||c.w)*cam.zoom, th=(hoverCell.th||c.h)*cam.zoom;
        const sxC=(hoverCell.x-(hoverCell.tw||c.w)/2-cam.x*p)*cam.zoom;
        const syC=(hoverCell.y-(hoverCell.th||c.h)/2-cam.y*p)*cam.zoom;
        ctx.strokeStyle=eraseMode?"rgba(255,90,90,.9)":"rgba(92,192,204,.95)";
        ctx.lineWidth=2;ctx.strokeRect(sxC,syC,tw,th);
      }
    }
  }

  // 画布上的取块板(屏幕固定,点格取块,拖标题移动)
  if(placeMode==="tile" && sheet && sheet.img && mode!=="play"){
    drawSheet();
  }

  requestAnimationFrame(draw);
}
function sheetRect(){
  if(!sheet)return null;
  const p=parallaxOf(curLayer), sc=tileScale*cam.zoom;
  const [x,y]=worldToScreen(sheet.wx,sheet.wy,p);
  return {x,y,sc,iw:sheet.img.naturalWidth*sc, ih:sheet.img.naturalHeight*sc};
}
function drawSheet(){
  const r=sheetRect(), sc=r.sc;
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(sheet.img,r.x,r.y,r.iw,r.ih);
  // 网格
  const g=gridBase*sc;
  ctx.strokeStyle="rgba(255,210,74,.7)";ctx.lineWidth=1;
  for(let gx=0;gx<=r.iw+0.5;gx+=g){ctx.beginPath();ctx.moveTo(r.x+gx,r.y);ctx.lineTo(r.x+gx,r.y+r.ih);ctx.stroke();}
  for(let gy=0;gy<=r.ih+0.5;gy+=g){ctx.beginPath();ctx.moveTo(r.x,r.y+gy);ctx.lineTo(r.x+r.iw,r.y+gy);ctx.stroke();}
  // 选区
  if(sheet.sel){const[a,b,wd,ht]=sheet.sel;
    ctx.fillStyle="rgba(92,192,204,.3)";ctx.fillRect(r.x+a*sc,r.y+b*sc,wd*sc,ht*sc);
    ctx.strokeStyle="#5cc0cc";ctx.lineWidth=2;ctx.strokeRect(r.x+a*sc,r.y+b*sc,wd*sc,ht*sc);}
  // 外框 + 两个小角标(★全存 / ✕关闭),无标题栏
  ctx.strokeStyle="rgba(92,192,204,.9)";ctx.lineWidth=2;ctx.strokeRect(r.x,r.y,r.iw,r.ih);
  ctx.font="bold 13px sans-serif";ctx.textBaseline="middle";ctx.textAlign="center";
  ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(r.x,r.y,20,18);ctx.fillStyle="#ffd24a";ctx.fillText("★",r.x+10,r.y+9);
  ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(r.x+r.iw-20,r.y,20,18);ctx.fillStyle="#ff6b6b";ctx.fillText("✕",r.x+r.iw-10,r.y+9);
  ctx.textAlign="left";
  ctx.restore();
}
let hoverCell=null;
requestAnimationFrame(draw);

//==================== 命中测试 ====================
function hitInstance(sx,sy){
  const order=[...scene.instances].sort((a,b)=>
    layerIndex(a.layer)-layerIndex(b.layer) || (a.z||0)-(b.z||0));
  for(let i=order.length-1;i>=0;i--){
    const ins=order[i];const p=parallaxOf(ins.layer);
    const d=srcDims(ins); if(d.e&&!d.e.loaded&&!ins.anim) continue;
    const fw=d.fw, fh=d.fh;
    const [cx,cy]=worldToScreen(ins.x,ins.y,p);
    const ang=-(ins.rot||0)*Math.PI/180;
    let dx=sx-cx,dy=sy-cy;
    const rx=dx*Math.cos(ang)-dy*Math.sin(ang);
    const ry=dx*Math.sin(ang)+dy*Math.cos(ang);
    const iw=fw*ins.scale*cam.zoom/2;
    const ih=fh*ins.scale*cam.zoom/2;
    if(Math.abs(rx)<=iw&&Math.abs(ry)<=ih) return ins;
  }
  return null;
}
let selMarker=null;
// 当前层(可选)下、点下方最顶的零件 —— 给"擦除任意块/右键删"用
function topInstanceAt(sx,sy,onlyCurLayer){
  const order=[...scene.instances].sort((a,b)=>
    layerIndex(a.layer)-layerIndex(b.layer) || (a.z||0)-(b.z||0));
  for(let i=order.length-1;i>=0;i--){
    const ins=order[i];
    if(onlyCurLayer && ins.layer!==curLayer) continue;
    const p=parallaxOf(ins.layer);
    const d=srcDims(ins); if(d.e&&!d.e.loaded&&!ins.anim) continue;
    const [cx,cy]=worldToScreen(ins.x,ins.y,p);
    const ang=-(ins.rot||0)*Math.PI/180, dx=sx-cx, dy=sy-cy;
    const rx=dx*Math.cos(ang)-dy*Math.sin(ang), ry=dx*Math.sin(ang)+dy*Math.cos(ang);
    if(Math.abs(rx)<=d.fw*ins.scale*cam.zoom/2 && Math.abs(ry)<=d.fh*ins.scale*cam.zoom/2) return ins;
  }
  return null;
}
function hitMarker(sx,sy){
  for(let i=scene.markers.length-1;i>=0;i--){
    const m=scene.markers[i];const [mx,my]=worldToScreen(m.x,m.y,1);
    if(Math.hypot(sx-mx,sy-my)<16) return m;
  }
  return null;
}

//==================== 指针交互 ====================
const ptrs=new Map();
let drag=null;        // {type:'pan'|'move'|'pending', ...}
let pinch=null;
let lpTimer=null;     // 长按计时
const LONGPRESS=300;  // ms，长按拿起
const MOVE_TOL=10;    // px，超过即判定为划动(平移)而非长按

cv.addEventListener("contextmenu",e=>e.preventDefault());   // 右键擦除,不弹菜单
cv.addEventListener("mousedown",e=>{if(e.button===1)e.preventDefault();}); // 中键:禁用自动滚动
cv.addEventListener("pointerdown",e=>{
  cv.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){ // 进入缩放
    clearTimeout(lpTimer);
    const pts=[...ptrs.values()];
    pinch={d:dist(pts[0],pts[1]),zoom:cam.zoom,
      cx:(pts[0].x+pts[1].x)/2,cy:(pts[0].y+pts[1].y)/2,camx:cam.x,camy:cam.y};
    drag=null;return;
  }
  const sx=e.clientX,sy=e.clientY;
  if(e.button===1){ drag={type:"pan",camx:cam.x,camy:cam.y,sx,sy}; return; } // 中键拖=平移(各模式通用)
  if(mode==="marker"){
    const [wx,wy]=screenToWorld(sx,sy,1);
    scene.markers.push({type:markType,x:Math.round(wx),y:Math.round(wy)});
    return;
  }
  // 取块板:角标(★全存/✕关闭) · 点格取块 · 拖动整体移动
  if(placeMode==="tile" && sheet && mode==="edit"){
    const r=sheetRect();
    if(sy>=r.y && sy<=r.y+18){
      if(sx>=r.x && sx<=r.x+20){ sheetSaveAll(); return; }                 // ★全存
      if(sx>=r.x+r.iw-20 && sx<=r.x+r.iw){ sheet=null; return; }           // ✕
    }
    if(sx>=r.x && sx<=r.x+r.iw && sy>=r.y && sy<=r.y+r.ih){
      if(e.button===2)return;                                             // 右键在板上不误擦
      drag={type:"sheetpt",sx,sy,ox:sheet.wx,oy:sheet.wy,moved:false}; return; // 轻点=取格,拖=移动
    }
  }
  // 瓦片模式：单指 = 铺/擦；(双指走上面的缩放分支)
  if(placeMode==="tile" && mode==="edit"){
    if(!brush){showHint("点下方素材贴成取块板，点格子拿来铺");return;}
    const erasing=eraseMode||e.button===2;           // 右键=擦除
    painting=true; lastCell=null; stampTile(sx,sy,erasing); drag={type:"tile",erase:erasing}; return;
  }
  // 自由摆放:右键 = 删除当前层点下方的零件
  if(e.button===2){
    const t=topInstanceAt(sx,sy,true);
    if(t){scene.instances=scene.instances.filter(i=>i!==t);sel=null;selMarker=null;updateActions();showHint("已删除");}
    else showHint("右键删本层零件:这里没有");
    return;
  }
  // 先看是不是点在"缩放手柄"上(选中物件右下角)
  const hb=handleScreen();
  if(hb && Math.hypot(sx-hb[0],sy-hb[1])<28){
    const ins=curIns();
    const sd=srcDims(ins);
    const bottom=ins.y+sd.fh*ins.scale/2;          // 记录底边世界坐标(缩放时保持不动)
    drag={type:"resize",ins,fh:sd.fh,bottom,cx:hb[2],cy:hb[3],startScale:ins.scale,startDist:Math.max(10,Math.hypot(sx-hb[2],sy-hb[3]))};
    return;
  }
  // 点中物件/标记 = 直接选中(还能马上拖动)；点空白 = 取消选中并可平移
  const m=hitMarker(sx,sy);
  const ins=m?null:hitInstance(sx,sy);
  // 只能编辑"当前层"的零件：点到别层的零件 → 提示先切层，不误拖
  if(ins && ins.layer!==curLayer){
    showHint("这个在「"+(LAYER_DEF.find(l=>l.id===ins.layer)||{}).name+"」层，先点上方该层标签再选/拖");
    drag={type:"pan",camx:cam.x,camy:cam.y,sx,sy};
    sel=null;selMarker=null;updateActions();
    return;
  }
  if(m||ins){
    if(ins){sel=ins.id;selMarker=null;}else{selMarker=m;sel=null;}
    updateActions();
    drag={type:"move",tgt:{kind:m?"marker":"ins",obj:m||ins},ox:(m?m.x:ins.x),oy:(m?m.y:ins.y),sx,sy};
  }else{
    drag={type:"pan",camx:cam.x,camy:cam.y,sx,sy};
    sel=null;selMarker=null;updateActions();
  }
});
cv.addEventListener("pointermove",e=>{
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(placeMode==="tile"&&brush&&mode==="edit") hoverCell=cellAt(e.clientX,e.clientY);
  if(drag&&drag.type==="sheetpt"){
    if(!drag.moved&&Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)>6)drag.moved=true;
    if(drag.moved){ sheet.wx=Math.round(drag.ox+(e.clientX-drag.sx)/cam.zoom); sheet.wy=Math.round(drag.oy+(e.clientY-drag.sy)/cam.zoom); }
    return;
  }
  if(painting&&drag&&drag.type==="tile"&&ptrs.size<2){ stampTile(e.clientX,e.clientY,drag.erase); return; }
  if(pinch&&ptrs.size>=2){
    const pts=[...ptrs.values()];
    const nd=dist(pts[0],pts[1]);
    const nz=Math.max(0.12,Math.min(3,pinch.zoom*nd/pinch.d));
    const [wxa,wya]=[pinch.cx/pinch.zoom+pinch.camx, pinch.cy/pinch.zoom+pinch.camy];
    cam.zoom=nz;
    cam.x=wxa-pinch.cx/nz; cam.y=wya-pinch.cy/nz;
    return;
  }
  if(!drag)return;
  if(drag.type==="pending"){
    // 还没长按就划动 → 当作平移，取消"拿起"
    if(Math.hypot(e.clientX-drag.sx,e.clientY-drag.sy)>MOVE_TOL){
      clearTimeout(lpTimer);
      drag={type:"pan",camx:cam.x,camy:cam.y,sx:drag.sx,sy:drag.sy};
    }else return;
  }
  if(drag.type==="pan"){
    cam.x=drag.camx-(e.clientX-drag.sx)/cam.zoom;
    cam.y=drag.camy-(e.clientY-drag.sy)/cam.zoom;
  }else if(drag.type==="move"){
    const o=drag.tgt.obj;
    o.x=Math.round(drag.ox+(e.clientX-drag.sx)/cam.zoom);
    o.y=Math.round(drag.oy+(e.clientY-drag.sy)/cam.zoom);
  }else if(drag.type==="resize"){
    const d=Math.hypot(e.clientX-drag.cx,e.clientY-drag.cy);
    drag.ins.scale=Math.max(0.05,Math.min(12, +(drag.startScale*d/drag.startDist).toFixed(3)));
    drag.ins.y=Math.round(drag.bottom-drag.fh*drag.ins.scale/2);   // 底边固定,向上长
  }
});
function endPtr(e){
  clearTimeout(lpTimer);
  if(drag&&drag.type==="sheetpt"){     // 轻点=取这格当刷子;拖过=只是移动了板子
    if(!drag.moved){ sheetPickAt(drag.sx,drag.sy,drag.sx,drag.sy);
      if(sheet&&sheet.sel&&sheet.sel[2]>=2){brush={asset:sheet.file,crop:sheet.sel.slice(),w:sheet.sel[2],h:sheet.sel[3]};
        updateBrushChip();showHint("已取 "+sheet.sel[2]+"×"+sheet.sel[3]+"：左键铺·右键擦");}}
    ptrs.delete(e.pointerId);if(ptrs.size===0)drag=null;return;}
  if(drag&&drag.type==="tile"){painting=false;lastCell=null;ptrs.delete(e.pointerId);if(ptrs.size===0)drag=null;return;}
  // 轻点(未长按未划动) = 选中
  if(drag&&drag.type==="pending"){
    if(drag.tgt.kind==="ins"){sel=drag.tgt.obj.id;selMarker=null;}
    else{selMarker=drag.tgt.obj;sel=null;}
    updateActions();
  }
  ptrs.delete(e.pointerId);
  if(ptrs.size<2)pinch=null;
  if(ptrs.size===0)drag=null;
}
cv.addEventListener("pointerup",endPtr);
cv.addEventListener("pointercancel",endPtr);
// 桌面滚轮缩放
cv.addEventListener("wheel",e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.9;
  const nz=Math.max(0.12,Math.min(3,cam.zoom*f));
  const [wx,wy]=[e.clientX/cam.zoom+cam.x,e.clientY/cam.zoom+cam.y];
  cam.zoom=nz;cam.x=wx-e.clientX/nz;cam.y=wy-e.clientY/nz;
},{passive:false});
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// 一键铺满可视区：大小=玩家"刚好一屏"(与当前编辑缩放无关)，竖直居中可视区
function fillToView(ins){
  const d=srcDims(ins); if(d.e&&!d.e.loaded&&!ins.anim){showHint("图还没加载好，再点一次");return;}
  const p=parallaxOf(ins.layer);
  // 玩家可视区(世界单位)：高=view.h，宽=高×屏幕比例(至少16:9)
  const aspect=Math.max(16/9, innerWidth/innerHeight);
  const vw=scene.view.h*aspect, vh=scene.view.h;
  // cover：图世界尺寸盖住该矩形，留 2% 余量。注意:不含 zoom → 预览/编辑一致
  ins.scale=+(1.02*Math.max(vw/d.fw, vh/d.fh)).toFixed(3);
  // 预览(主视角)相机参数，保证预览时正好竖直居中可视区
  const pcy=scene.view.groundY-scene.view.h;     // 主视角相机Y(可视区顶)
  ins.y=Math.round(vh/2 + pcy*p);                // 让图中心落在可视区中心
  ins.x=Math.round(cam.x*p + (innerWidth/2)/cam.zoom); // 横向对到你当前在看的位置
  showHint("已铺满可视区(=玩家一屏)；想让远景一路都有，换「瓦片铺」横向平铺这张背景");
}

//==================== 瓦片格子 ====================
// 基准网格(源px)：所有块都吸附到这套固定网格线
let gridBase=32;
function gridStepWorld(){ return Math.max(1,Math.round(gridBase*tileScale)); } // 网格步长(世界px,与刷子无关)
// 把素材放到画布上(世界坐标,随平移缩放)当"取块板"
function showSheet(file){
  const e=getImg(ASSET_BASE+file);
  const setup=()=>{
    const p=parallaxOf(curLayer);
    const [wcx,wcy]=screenToWorld(innerWidth/2, innerHeight*0.42, p);  // 放到你正看的画布中间
    sheet={file,img:e.img,
      wx:Math.round(wcx-e.img.naturalWidth*tileScale/2),
      wy:Math.round(wcy-e.img.naturalHeight*tileScale/2), sel:null};
    showHint("取块板已放到画布：点格=拿来铺，拖标题移动，✕关闭");
  };
  if(e.loaded)setup(); else e.img.addEventListener("load",setup,{once:true});
}
// 拖拽落点版:放到松手处的世界坐标
function showSheetAt(file,cx,cy){
  const e=getImg(ASSET_BASE+file);
  const setup=()=>{
    const p=parallaxOf(curLayer);
    const [wx,wy]=screenToWorld(cx,cy,p);
    sheet={file,img:e.img,
      wx:Math.round(wx-e.img.naturalWidth*tileScale/2),
      wy:Math.round(wy-e.img.naturalHeight*tileScale/2), sel:null};
    showHint("拖到画布了：点格=拿来铺");
  };
  if(e.loaded)setup(); else e.img.addEventListener("load",setup,{once:true});
}
function sheetPickAt(asx,asy,bsx,bsy){    // 屏幕坐标 → 按网格吸附选格
  const r=sheetRect(),sc=r.sc,g=gridBase;
  const iw=sheet.img.naturalWidth, ih=sheet.img.naturalHeight;
  const ix0=(asx-r.x)/sc, iy0=(asy-r.y)/sc, ix1=(bsx-r.x)/sc, iy1=(bsy-r.y)/sc;
  const c0=Math.floor(Math.min(ix0,ix1)/g),c1=Math.floor(Math.max(ix0,ix1)/g);
  const r0=Math.floor(Math.min(iy0,iy1)/g),r1=Math.floor(Math.max(iy0,iy1)/g);
  const x=Math.max(0,c0*g),y=Math.max(0,r0*g);
  const w=Math.min(iw,(c1+1)*g)-x, h=Math.min(ih,(r1+1)*g)-y;
  sheet.sel=[x,y,Math.max(g,w),Math.max(g,h)];
}
function sheetSaveAll(){
  if(!sheet)return;
  const g=gridBase,iw=sheet.img.naturalWidth,ih=sheet.img.naturalHeight,lib=loadLib();let n=0;
  for(let y=0;y<ih;y+=g)for(let x=0;x<iw;x+=g){
    const w=Math.min(g,iw-x),h=Math.min(g,ih-y); if(w<2||h<2)continue;
    if(lib.some(z=>z.asset===sheet.file && JSON.stringify(z.crop||null)===JSON.stringify([x,y,w,h])))continue;
    lib.push({id:uid(),name:"块"+w+"×"+h,asset:sheet.file,crop:[x,y,w,h],w,h});n++;
  }
  saveLib(lib);showHint("已存入 "+n+" 个格子到刷库");$("libDock").classList.add("show");renderLib();
}
function gridCell(){ // 吸附/网格显示用的格子(世界单位,取整)
  if(!brush) return null;
  const s=gridStepWorld();return {w:s,h:s,base:true};
}
// 屏幕点 -> 落点。瓦片左下角吸附到网格交点(底边按地面线分行)，向上/右铺其本身大小
function cellAt(sx,sy){
  const c=gridCell(); if(!c) return null;
  const p=parallaxOf(curLayer);
  const [wx,wy]=screenToWorld(sx,sy,p);
  const col=Math.floor(wx/c.w);
  const row=Math.floor((scene.view.groundY-wy)/c.h);     // 0=贴地面线那行
  const tw=Math.max(1,Math.round(brush.w*tileScale)), th=Math.max(1,Math.round(brush.h*tileScale));
  const leftX=col*c.w, bottomY=scene.view.groundY-row*c.h; // 网格交点=瓦片左下角
  return {col,row,x:Math.round(leftX+tw/2),y:Math.round(bottomY-th/2),tw,th,w:c.w,h:c.h};
}
function findTileAt(cell){
  // 基准网格下按"半个瓦片"范围判重,避免细网格拖动堆叠大量重叠块
  const tx=gridBase>0?Math.max(2,cell.tw*0.5):2, ty=gridBase>0?Math.max(2,cell.th*0.5):2;
  return scene.instances.find(i=>i.layer===curLayer && i.asset===brush.asset &&
    JSON.stringify(i.crop||null)===JSON.stringify(brush.crop||null) &&
    Math.abs(i.x-cell.x)<tx && Math.abs(i.y-cell.y)<ty);
}
function stampTile(sx,sy,erase){
  if(erase===undefined) erase=eraseMode;
  if(erase){                                           // 擦除:删掉点下方任意一块(本层),不限当前刷子
    const t=topInstanceAt(sx,sy,true);
    if(t) scene.instances=scene.instances.filter(i=>i!==t);
    return;
  }
  const cell=cellAt(sx,sy); if(!cell) return;
  const key=cell.col+","+cell.row;
  if(lastCell===key) return; lastCell=key;
  const exist=findTileAt(cell);
  if(exist) return;                                    // 同格已有,不重复
  scene.instances.push({id:uid(),layer:curLayer,asset:brush.asset,
    crop:brush.crop?brush.crop.slice():null,tile:true,
    x:cell.x,y:cell.y,scale:+tileScale.toFixed(3),rot:0,flipX:false,z:0,opacity:1});
}

//==================== 选中操作 ====================
function curIns(){return scene.instances.find(i=>i.id===sel);}
// 选中物件右下角的缩放手柄屏幕坐标 [手柄x,手柄y, 中心x,中心y]
function handleScreen(){
  const ins=curIns(); if(!ins)return null;
  const p=parallaxOf(ins.layer);
  const d=srcDims(ins); if(d.e&&!d.e.loaded&&!ins.anim)return null;
  const fw=d.fw, fh=d.fh;
  const [cx,cy]=worldToScreen(ins.x,ins.y,p);
  const iw=fw*ins.scale*cam.zoom/2, ih=fh*ins.scale*cam.zoom/2;
  return [cx+iw,cy+ih,cx,cy];
}
function updateActions(){
  $("actions").classList.toggle("show",!!sel||!!selMarker);
  $("palette").classList.toggle("hidden",!!sel||!!selMarker||mode!=="edit");
}
$("actions").addEventListener("click",e=>{
  const a=e.target.dataset.a;if(!a)return;
  if(selMarker){
    if(a==="del"){scene.markers=scene.markers.filter(m=>m!==selMarker);selMarker=null;}
    if(a==="done"){selMarker=null;}
    updateActions();return;
  }
  const ins=curIns();if(!ins)return;
  if(a==="scaleUp")ins.scale=Math.min(8,ins.scale*1.12);
  if(a==="scaleDn")ins.scale=Math.max(0.05,ins.scale/1.12);
  if(a==="rotL")ins.rot=(ins.rot||0)-5;
  if(a==="rotR")ins.rot=(ins.rot||0)+5;
  if(a==="flip")ins.flipX=!ins.flipX;
  if(a==="fill")fillToView(ins);
  if(a==="layer"){const i=layerIndex(ins.layer);ins.layer=LAYER_DEF[(i+1)%LAYER_DEF.length].id;showHint("图层："+LAYER_DEF.find(l=>l.id===ins.layer).name);}
  if(a==="front")ins.z=Math.max(0,...scene.instances.filter(i=>i.layer===ins.layer).map(i=>i.z||0))+1;
  if(a==="back")ins.z=Math.min(0,...scene.instances.filter(i=>i.layer===ins.layer).map(i=>i.z||0))-1;
  if(a==="dup"){const c={...ins,id:uid(),x:ins.x+30,y:ins.y+30};scene.instances.push(c);sel=c.id;}
  if(a==="del"){scene.instances=scene.instances.filter(i=>i.id!==sel);sel=null;}
  if(a==="done"){sel=null;}
  updateActions();
});

//==================== 调色板（静态零件 + 动画） ====================
async function loadManifest(){
  PAL=[];
  try{
    manifest=await (await fetch(ASSET_BASE+"manifest.json")).json();
    manifest.categories.forEach(c=>PAL.push({
      name:c.name.replace(/_/g," "), key:c.name, anim:false,
      items:c.pieces.map(p=>({file:p.file,w:p.w,h:p.h,kind:p.kind||"object",tileX:!!p.tileX}))}));
  }catch(err){showHint("素材清单加载失败");}
  try{
    const ar=await (await fetch(ANIM_BASE+"manifest.json")).json();
    const RN={plant:"🌿动画·植物",enemy:"👾动画·敌人",player:"🧙动画·主角"};
    const groups={};
    ar.animations.forEach(c=>{ANIM[c.name]=c;(groups[c.role]=groups[c.role]||[]).push(c.name);});
    ["player","enemy","plant"].forEach(role=>{
      if(groups[role])PAL.push({name:RN[role],key:"anim_"+role,anim:true,
        items:groups[role].map(clip=>({clip}))});
    });
  }catch(e){/* 动画可选 */}
  if(!PAL.length){
    const c=$("cats"); if(c) c.innerHTML='<span style="color:#9a958a;font-size:12px;padding:6px">暂无素材：请确认素材包 manifest.json 已部署。</span>';
    return;
  }
  palCat=PAL[0].key;buildCats();buildPieces();
}
function curCat(){return PAL.find(c=>c.key===palCat);}
function buildCats(){
  const el=$("cats");el.innerHTML="";
  PAL.forEach(c=>{
    const d=document.createElement("div");
    d.className="cat"+(c.key===palCat?" active":"");
    d.textContent=c.name;
    d.onclick=()=>{palCat=c.key;buildCats();buildPieces();};
    el.appendChild(d);
  });
}
function buildPieces(){
  const el=$("pieces");el.innerHTML="";
  const cat=curCat();if(!cat)return;
  cat.items.forEach(it=>{
    const d=document.createElement("div");d.className="pc";
    if(cat.anim){
      const c=ANIM[it.clip];const rows=Math.ceil(c.count/c.cols);
      const box=document.createElement("div");
      box.style.cssText="width:100%;height:100%;background-repeat:no-repeat;background-position:0 0;";
      box.style.backgroundImage=`url(${ANIM_BASE+c.file})`;
      box.style.backgroundSize=`${c.cols*100}% ${rows*100}%`;
      d.appendChild(box);
      d.onclick=()=>addAnim(it.clip);
    }else{
      const im=document.createElement("img");im.src=ASSET_BASE+it.file;im.loading="lazy";
      d.appendChild(im);
      if(it.kind==="tile"){d.classList.add("tilekind");const tg=document.createElement("span");tg.className="tag";tg.textContent="瓦片";d.appendChild(tg);}
      d.onclick=()=>{ if(placeMode!=="tile") addPiece(it); };   // 自由摆放:点=放
      bindPieceDrag(d,it.file);                                  // 瓦片模式:拖到画布=取块板
    }
    el.appendChild(d);
    return;
  });
  return;
}
// 瓦片模式下,把底部素材"拖拽"到画布 → 落点出现取块板;轻点=放到中间
function bindPieceDrag(el,file){
  el.addEventListener("pointerdown",e=>{
    if(placeMode!=="tile")return;
    e.preventDefault();
    const start={x:e.clientX,y:e.clientY}; let moved=false,ghost=null;
    const move=ev=>{
      if(!moved&&Math.hypot(ev.clientX-start.x,ev.clientY-start.y)>8){moved=true;
        ghost=document.createElement("img");ghost.src=ASSET_BASE+file;
        ghost.style.cssText="position:fixed;pointer-events:none;opacity:.85;width:54px;height:54px;z-index:99;image-rendering:pixelated;";
        document.body.appendChild(ghost);}
      if(ghost){ghost.style.left=(ev.clientX-27)+"px";ghost.style.top=(ev.clientY-27)+"px";}
    };
    const up=ev=>{
      window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);
      if(ghost)ghost.remove();
      const palTop=$("palette").getBoundingClientRect().top;
      if(moved && ev.clientY<palTop-4) showSheetAt(file,ev.clientX,ev.clientY); // 拖到画布上松手
      else if(!moved) showSheet(file);                                          // 轻点=放中间
    };
    window.addEventListener("pointermove",move);window.addEventListener("pointerup",up);
  });
}
function placeAt(){return screenToWorld(innerWidth/2,innerHeight/2,parallaxOf(curLayer));}
function addPiece(p){
  const [wx]=placeAt();
  const isBg=curCat() && /背景|Background/i.test(curCat().name);
  const layer=curLayer;                             // 尊重你当前选的层(不再强制远景)
  const sc0=isBg?1:+Math.min(1.6,(innerHeight*0.5/cam.zoom)/Math.max(p.w,p.h)).toFixed(3);
  const wy=scene.view.groundY-(p.h*sc0)/2;          // 暂落地面线
  const o={id:uid(),layer,asset:p.file,x:Math.round(wx),y:Math.round(wy),scale:sc0,rot:0,flipX:false,z:0};
  scene.instances.push(o); sel=o.id; selMarker=null; updateActions();
  const lname=(LAYER_DEF.find(l=>l.id===layer)||{}).name||layer;
  if(isBg){ fillToView(o); showHint("背景已铺满可视区（"+lname+"层）；拖动微调，或再点「铺满可视区」"); }
  else showHint("已放到地面线（"+lname+"层）；左右拖摆位置，拖金点缩放，或点「铺满可视区」");
}
function addAnim(clip){
  const c=ANIM[clip];const [wx,wy]=placeAt();
  const target=innerHeight*0.42/cam.zoom;
  const sc=Math.min(2,target/Math.max(c.fw,c.fh));
  scene.instances.push({id:uid(),layer:curLayer,anim:clip,fps:c.fps,
    x:Math.round(wx),y:Math.round(wy),scale:+sc.toFixed(3),rot:0,flipX:false,z:0});
  showHint("已放入会动的「"+clip+"」");
}

//==================== 取块（按固定网格,点格子=拿来铺） ====================
let cropState=null; // {file,img,scale,sel:[x,y,w,h]|null,drag}
function openCropPanel(){            // ✂取块按钮:先选一张素材
  const cats=$("cropCats");cats.innerHTML="";
  PAL.filter(c=>!c.anim).forEach(c=>c.items.forEach(it=>{
    const b=document.createElement("div");b.className="cat";b.textContent=it.file.replace(".png","");
    b.onclick=()=>loadCropImg(it.file);cats.appendChild(b);
  }));
  cropState=null;$("cropInfo").textContent="选一张素材，再点格子拿来铺";
  const cv2=$("cropCv");cv2.getContext("2d").clearRect(0,0,cv2.width,cv2.height);
  syncCropGridBtns();openPanel("cropPanel");
}
function openCropForSheet(file){     // 点底部素材:直接打开它,按网格取块
  syncCropGridBtns();openPanel("cropPanel");loadCropImg(file);
}
function loadCropImg(file){
  const e=getImg(ASSET_BASE+file);
  const draw=()=>{
    const cv2=$("cropCv");
    const maxW=Math.min(360,innerWidth-64);
    const sc=Math.min(maxW/e.img.naturalWidth, 360/e.img.naturalHeight, 6);
    cv2.width=Math.round(e.img.naturalWidth*sc);cv2.height=Math.round(e.img.naturalHeight*sc);
    cropState={file,img:e.img,scale:sc,sel:null,drag:null};
    renderCrop();
    $("cropInfo").textContent="点一格=拿来铺；拖几格=拿一整块";
  };
  if(e.loaded)draw(); else e.img.addEventListener("load",draw,{once:true});
}
function syncCropGridBtns(){
  document.querySelectorAll("#cropGridRow [data-g]").forEach(b=>b.classList.toggle("p",+b.dataset.g===gridBase));
}
function renderCrop(){
  if(!cropState)return;
  const cv2=$("cropCv"),c=cv2.getContext("2d"),sc=cropState.scale,g=gridBase;
  c.imageSmoothingEnabled=false;c.clearRect(0,0,cv2.width,cv2.height);
  c.drawImage(cropState.img,0,0,cv2.width,cv2.height);
  c.strokeStyle="rgba(255,210,74,.7)";c.lineWidth=1;
  for(let x=0;x<=cropState.img.naturalWidth;x+=g){const sx=x*sc;c.beginPath();c.moveTo(sx,0);c.lineTo(sx,cv2.height);c.stroke();}
  for(let y=0;y<=cropState.img.naturalHeight;y+=g){const sy=y*sc;c.beginPath();c.moveTo(0,sy);c.lineTo(cv2.width,sy);c.stroke();}
  if(cropState.sel){const[x,y,w,h]=cropState.sel.map(v=>v*sc);
    c.fillStyle="rgba(92,192,204,.3)";c.fillRect(x,y,w,h);
    c.strokeStyle="#5cc0cc";c.lineWidth=2;c.strokeRect(x,y,w,h);}
}
function cropCellSel(ax,ay,bx,by){   // 按固定网格吸附成整格
  const g=gridBase,iw=cropState.img.naturalWidth,ih=cropState.img.naturalHeight;
  const c0=Math.floor(Math.min(ax,bx)/g),c1=Math.floor(Math.max(ax,bx)/g);
  const r0=Math.floor(Math.min(ay,by)/g),r1=Math.floor(Math.max(ay,by)/g);
  const x=c0*g,y=r0*g,w=Math.min(iw,(c1+1)*g)-x,h=Math.min(ih,(r1+1)*g)-y;
  return [x,y,w,h];
}
(function bindCrop(){
  const cv2=$("cropCv");
  const toImg=(ev)=>{const r=cv2.getBoundingClientRect();
    return [Math.max(0,Math.min(cv2.width,(ev.clientX-r.left)*cv2.width/r.width))/cropState.scale,
            Math.max(0,Math.min(cv2.height,(ev.clientY-r.top)*cv2.height/r.height))/cropState.scale];};
  cv2.addEventListener("pointerdown",ev=>{if(!cropState)return;cv2.setPointerCapture(ev.pointerId);
    const[x,y]=toImg(ev);cropState.drag={x,y};cropState.sel=cropCellSel(x,y,x,y);renderCrop();});
  cv2.addEventListener("pointermove",ev=>{if(!cropState||!cropState.drag)return;
    const[x,y]=toImg(ev);const d=cropState.drag;cropState.sel=cropCellSel(d.x,d.y,x,y);renderCrop();});
  cv2.addEventListener("pointerup",()=>{    // 松手=拿这块去铺
    if(!cropState||!cropState.drag)return;cropState.drag=null;
    const b=cropBrush();if(b){brush=b;updateBrushChip();if(placeMode!=="tile")setMode("tile");closePanels();
      showHint("已取 "+b.w+"×"+b.h+"：左键铺 · 右键擦");}});
})();
$("cropGridRow").addEventListener("click",e=>{
  const g=e.target.dataset.g;if(!g)return;gridBase=+g;$("btnGrid").textContent="网格:"+gridBase+"px";
  syncCropGridBtns();renderCrop();
});
function cropBrush(){
  if(!cropState||!cropState.sel||cropState.sel[2]<2||cropState.sel[3]<2)return null;
  const s=cropState.sel.map(Math.round);
  return {asset:cropState.file,crop:s,w:s[2],h:s[3]};
}
// 把整张图按网格的所有格子,逐个存进刷库
$("cropSaveAll").onclick=()=>{
  if(!cropState){showHint("先选一张素材");return;}
  const g=gridBase,iw=cropState.img.naturalWidth,ih=cropState.img.naturalHeight,lib=loadLib();let n=0;
  for(let y=0;y<ih;y+=g)for(let x=0;x<iw;x+=g){
    const w=Math.min(g,iw-x),h=Math.min(g,ih-y); if(w<2||h<2)continue;
    if(lib.some(z=>z.asset===cropState.file && JSON.stringify(z.crop||null)===JSON.stringify([x,y,w,h])))continue;
    lib.push({id:uid(),name:"块"+w+"×"+h,asset:cropState.file,crop:[x,y,w,h],w,h});n++;
  }
  saveLib(lib);showHint("已存入 "+n+" 个格子到刷库");$("libDock").classList.add("show");renderLib();
};
$("cropCancel").onclick=closePanels;

//==================== 瓦片刷库（localStorage，右侧竖排） ====================
const LIB_KEY="aiengine.tileBrushes.v1";
function loadLib(){try{return JSON.parse(localStorage.getItem(LIB_KEY)||"[]");}catch(e){return [];}}
function saveLib(a){try{localStorage.setItem(LIB_KEY,JSON.stringify(a));}catch(e){showHint("本机存储已满");}}
function sameCrop(a,b){return JSON.stringify(a||null)===JSON.stringify(b||null);}
function addToLib(b){
  if(!b){showHint("当前没有刷子");return;}
  const lib=loadLib();
  if(lib.some(x=>x.asset===b.asset && sameCrop(x.crop,b.crop))){showHint("刷库里已有这块");$("libDock").classList.add("show");renderLib();return;}
  const name=b.crop?("块"+b.crop[2]+"×"+b.crop[3]):b.asset.replace(".png","");
  lib.push({id:uid(),name,asset:b.asset,crop:b.crop||null,w:b.w,h:b.h});
  saveLib(lib);showHint("已收藏（共"+lib.length+"个）");$("libDock").classList.add("show");renderLib();
}
function drawBrushThumb(cvT,b){
  const e=getImg(ASSET_BASE+b.asset);
  const paint=()=>{const c=cvT.getContext("2d");c.imageSmoothingEnabled=false;c.clearRect(0,0,64,64);
    const sx=b.crop?b.crop[0]:0, sy=b.crop?b.crop[1]:0;
    const sw=b.crop?b.crop[2]:e.img.naturalWidth, sh=b.crop?b.crop[3]:e.img.naturalHeight;
    const sc=Math.min(60/sw,60/sh), dw=sw*sc, dh=sh*sc;
    c.drawImage(e.img,sx,sy,sw,sh,(64-dw)/2,(64-dh)/2,dw,dh);};
  if(e.loaded)paint(); else e.img.addEventListener("load",paint,{once:true});
}
function renderLib(){
  const list=$("libList");list.innerHTML="";
  const lib=loadLib();
  if(!lib.length){list.innerHTML='<span style="color:var(--muted);font-size:11px;padding:4px">空。取块后存进来。</span>';return;}
  lib.forEach(b=>{
    const card=document.createElement("div");card.className="libcard"+
      (brush&&brush.asset===b.asset&&sameCrop(brush.crop,b.crop)?" cur":"");
    const cvT=document.createElement("canvas");cvT.width=64;cvT.height=64;
    drawBrushThumb(cvT,b);
    cvT.onclick=()=>{brush={asset:b.asset,crop:b.crop?b.crop.slice():null,w:b.w,h:b.h};
      updateBrushChip();if(placeMode!=="tile")setMode("tile");renderLib();showHint("已选刷子："+b.name);};
    const del=document.createElement("button");del.className="delx";del.textContent="✕";
    del.onclick=(e)=>{e.stopPropagation();saveLib(loadLib().filter(x=>x.id!==b.id));renderLib();};
    const nm=document.createElement("div");nm.className="nm";nm.textContent=b.name;
    card.appendChild(cvT);card.appendChild(del);card.appendChild(nm);list.appendChild(card);
  });
}
function toggleLib(){const d=$("libDock");d.classList.toggle("show");if(d.classList.contains("show"))renderLib();}
function openLib(){const d=$("libDock");d.classList.add("show");renderLib();}
$("libAdd").onclick=()=>addToLib(brush);
$("libDockClose").onclick=()=>$("libDock").classList.remove("show");
$("libClear").onclick=()=>{if(confirm("清空刷库里所有收藏？")){saveLib([]);renderLib();showHint("刷库已清空");}};
// 拖左边手柄改变刷库宽度
(function(){const grip=$("libGrip");if(!grip)return;let dr=null;
  grip.addEventListener("pointerdown",e=>{grip.setPointerCapture(e.pointerId);dr=e.clientX;e.preventDefault();});
  grip.addEventListener("pointermove",e=>{if(dr==null)return;
    const wpx=Math.max(72,Math.min(innerWidth*0.7, innerWidth-e.clientX));
    $("libDock").style.width=Math.round(wpx)+"px";});
  grip.addEventListener("pointerup",()=>{dr=null;});
})();

//==================== 顶栏菜单 ====================
$("btnMenu").onclick=()=>$("menu").classList.toggle("show");

// 主视角：把镜头摆成玩家真实视角（可视区刚好充满屏幕）
function resetToPlayView(){
  const vh=scene.view.h, top=scene.view.groundY-vh;
  cam.zoom=innerHeight/vh;
  cam.y=top;                       // 可视区顶贴屏幕顶
  const sp=scene.markers.find(m=>m.type==="spawn");
  const cx=sp?sp.x:innerWidth/(2*cam.zoom);
  cam.x=cx-innerWidth/(2*cam.zoom); // 出生点居中
  showHint("主视角：屏幕内 ≈ 玩家所见");
}
$("btnHome").onclick=resetToPlayView;
$("btnMarker").onclick=()=>{openPanel("markPanel");};
$("btnPlay").onclick=()=>{
  mode=mode==="play"?"edit":"play";
  $("btnPlay").textContent=mode==="play"?"■ 停止":"▶ 预览";
  if(mode==="play"){sel=null;selMarker=null;updateActions();$("palette").classList.add("hidden");resetToPlayView();playScroll();}
  else{$("palette").classList.remove("hidden");}
};
let playRAF=null;
function playScroll(){
  // 简单自动横向滚动，展示视差
  cancelAnimationFrame(playRAF);
  function step(){
    if(mode!=="play")return;
    cam.x+=2/cam.zoom;
    if(cam.x>scene.world.width)cam.x=-innerWidth/cam.zoom;
    playRAF=requestAnimationFrame(step);
  }
  step();
}

$("mExport").onclick=()=>{

$("fileIn").onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  try{scene=normalizeScene(JSON.parse(await f.text()));sel=null;selMarker=null;resetToPlayView();showHint("已导入："+scene.name);}
  catch(err){showHint("JSON 解析失败");}

function normalizeScene(s){
  const b=blankScene();
  const world={...b.world,...(s.world||{})};
  const view=s.view||{h:Math.round(world.height*0.72),groundY:world.height-100};
  return {...b,...s,background:{...b.background,...(s.background||{})},
    world, view,
    instances:(s.instances||[]).map(i=>({id:i.id||uid(),layer:i.layer||"play",
      asset:i.asset,anim:i.anim,fps:i.fps,crop:i.crop||null,tile:!!i.tile,opacity:(i.opacity==null?1:i.opacity),
      x:i.x||0,y:i.y||0,scale:i.scale||1,rot:i.rot||0,flipX:!!i.flipX,z:i.z||0})),
    markers:s.markers||[]};
}

$("mPng").onclick=()=>{

//==================== 存/取仓库（复用上传页 token + Git Data API） ====================
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function gh(token,path,opts={}){
  let last;
  for(let a=0;a<5;a++){
    let res;
    try{res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}${path}`,{
      method:opts.method||"GET",
      headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json","Content-Type":"application/json"},
      body:opts.body?JSON.stringify(opts.body):undefined});
    }catch(e){last=e;await sleep(600*2**a);continue;}
    if(res.ok)return res.json();
    const body=await res.text();const err=new Error(`HTTP ${res.status} — ${body}`);
    if(res.status>=500||res.status===429||res.status===409){last=err;await sleep(600*2**a);continue;}
    throw err;
  }
  throw last;
}
function b64utf8(str){return btoa(unescape(encodeURIComponent(str)));}

$("mSave").onclick=()=>{
  $("saveName").value=scene.name==="untitled"?"":scene.name;
  $("saveTok").value=localStorage.getItem("gh_token")||"";
  $("saveLog").textContent="";openPanel("savePanel");
};
$("saveCancel").onclick=closePanels;
$("saveGo").onclick=async()=>{
  const name=($("saveName").value.trim()||"scene").replace(/[^\w\-]+/g,"_");
  const token=$("saveTok").value.trim();
  if(!token){$("saveLog").textContent="请填 GitHub 令牌";return;}
  localStorage.setItem("gh_token",token);
  scene.name=name;
  const path=`scenes/${name}.json`;
  const log=$("saveLog");log.textContent="提交中…";
  try{
    const ref=await gh(token,`/git/ref/heads/${BRANCH}`);
    const parent=ref.object.sha;
    const base=await gh(token,`/git/commits/${parent}`);
    const blob=await gh(token,"/git/blobs",{method:"POST",
      body:{content:b64utf8(JSON.stringify(scene,null,2)),encoding:"base64"}});
    const tree=await gh(token,"/git/trees",{method:"POST",
      body:{base_tree:base.tree.sha,tree:[{path,mode:"100644",type:"blob",sha:blob.sha}]}});
    const commit=await gh(token,"/git/commits",{method:"POST",
      body:{message:`scene: ${name}`,tree:tree.sha,parents:[parent]}});
    await gh(token,`/git/refs/heads/${BRANCH}`,{method:"PATCH",body:{sha:commit.sha}});
    log.textContent="✓ 已提交 "+path+"\n回聊天告诉 Claude 场景名："+name;
  }catch(e){log.textContent="失败："+e.message;}
};

$("mLoad").onclick=async()=>{
  openPanel("loadPanel");const list=$("loadList");list.textContent="读取中…";
  try{
    // 同源读取场景索引（构建时生成），无需令牌
    const r=await fetch(SCENE_BASE+"index.json?_="+Date.now());
    if(!r.ok)throw new Error("index "+r.status);
    const names=await r.json();
    if(!names.length){list.textContent="scenes/ 里还没有场景";return;}
    list.innerHTML="";
    names.forEach(name=>{
      const b=document.createElement("button");b.className="btn";b.style.width="100%";b.style.margin="4px 0";
      b.textContent="📄 "+name;
      b.onclick=async()=>{
        const sr=await fetch(SCENE_BASE+name+"?_="+Date.now());
        scene=normalizeScene(await sr.json());
        sel=null;selMarker=null;closePanels();resetToPlayView();showHint("已读取："+scene.name);
      };
      list.appendChild(b);
    });
  }catch(e){list.textContent="读取失败："+e.message+"\n（保存后需等构建部署 1-2 分钟才会出现在列表）";}
};
