<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>怪物导演 · 行动编排</title>
<style>
  :root{--ink:#eae6dd;--muted:#9a958a;--panel:#1d2226;--panel2:#262c31;--line:#333b41;--clay:#cc785c;--accent:#5cc0cc;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#11151a;color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}
  .topbar{position:sticky;top:0;display:flex;align-items:center;gap:6px;padding:8px;background:rgba(20,25,29,.96);
    border-bottom:1px solid var(--line);z-index:10;flex-wrap:wrap;}
  .title{font-size:15px;font-weight:700;margin-right:auto;}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:8px;
    padding:7px 10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn:active{background:#30373d;} .btn.p{background:var(--clay);border-color:var(--clay);}
  .btn.sm{padding:5px 8px;font-size:12px;}
  .wrap{display:flex;gap:12px;padding:12px;align-items:flex-start;flex-wrap:wrap;}
  .col{flex:1 1 400px;min-width:300px;}
  .preview{flex:1 1 340px;min-width:300px;position:sticky;top:60px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px;}
  .card h3{margin:0 0 8px;font-size:14px;}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px;flex-wrap:wrap;}
  input[type=text],input[type=number],select{background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:7px;padding:7px;font-size:13px;}
  input[type=range]{flex:1;}
  .ent{display:flex;align-items:center;gap:8px;margin:6px 0;}
  .dot{width:14px;height:14px;border-radius:4px;flex:0 0 auto;}
  .beat{border:1px solid var(--line);border-radius:10px;padding:8px;margin:7px 0;background:var(--panel2);}
  .beat.now{outline:2px solid var(--accent);}
  .beat .bh{display:flex;align-items:center;gap:6px;}
  .bnum{font-weight:800;color:var(--muted);flex:0 0 22px;}
  .who{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0;}
  .chip{font-size:12px;border-radius:14px;padding:3px 9px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);}
  .chip.on{background:#33403a;border-color:#46594f;color:#bfe3d2;}
  canvas{background:#0d1115;border:1px solid var(--line);border-radius:8px;display:block;width:100%;}
  .cap{font-size:13px;min-height:20px;margin-top:6px;color:#bfe3d2;font-weight:600;}
  .hint{font-size:12px;color:var(--muted);line-height:1.55;}
  textarea{width:100%;height:150px;background:#0d1115;color:var(--ink);border:1px solid var(--line);border-radius:8px;font-family:monospace;font-size:12px;padding:8px;}
  .mini{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div class="topbar">
  <div class="title">🎬 怪物导演 · 行动编排</div>
  <button class="btn sm" id="bNew">新建</button>
  <button class="btn sm" id="bSample">示例</button>
  <button class="btn sm" id="bCopy">复制给AI</button>
  <button class="btn sm" id="bExport">导出</button>
  <button class="btn sm" id="bImport">导入</button>
  <input type="file" id="fileIn" accept="application/json" style="display:none">
</div>

<div class="wrap">
  <div class="col">
    <div class="card">
      <h3>场景里的怪</h3>
      <div class="row"><span class="mini">名字</span><input type="text" id="sTitle" style="flex:1"></div>
      <div id="entList"></div>
      <button class="btn sm" id="bAddEnt">＋ 加一只怪</button>
      <div class="row" style="margin-top:10px"><span class="mini" style="flex:0 0 70px">玩家位置</span><input type="range" id="pPos" min="0" max="1" step="0.01"></div>
      <div class="hint">滑块 = 它们在场上从左到右的起始位置。位置/血量/伤害这些之后我来定，你试玩时用游戏里的 ⚙调参 面板拖滑块即时改。</div>
    </div>
    <div class="card">
      <h3>行动路线 <span class="mini">从上到下 = 时间顺序，一拍一个动作</span></h3>
      <div id="beatList"></div>
      <button class="btn sm p" id="bAddBeat">＋ 加一拍</button>
    </div>
  </div>
  <div class="preview">
    <div class="card">
      <h3>预览（粗略演示，看节奏走位）</h3>
      <canvas id="stage" width="360" height="200"></canvas>
      <div class="cap" id="cap"></div>
      <div class="row" style="justify-content:center">
        <button class="btn p" id="bPlay">▶ 播放整段</button>
        <button class="btn sm" id="bLoop">循环：关</button>
      </div>
    </div>
    <div class="card"><h3>行动路线文本（复制给我）</h3><textarea id="out" spellcheck="false"></textarea></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const LS="aiengine.director.v1";
function uid(){return Math.random().toString(36).slice(2,8);}
const COLORS=["#cc785c","#5cc0cc","#c2a85a","#b07acc","#7ac28a","#cc6a8a"];

// 动作表: [key, 标签, {n:需要次数, secs:需要秒数, text:需要文字}]
const ACTIONS=[
 ["idle","待命不动",{}],["look","盯着玩家",{}],["wait","等待",{secs:1}],
 ["approach","走向玩家",{}],["dash","冲向玩家",{}],["jumpTo","跳向玩家",{}],
 ["circle","绕到玩家身侧",{}],["back","后退一点",{}],["retreat","退回原位",{}],
 ["attack","攻击",{n:1}],["combo","连续攻击",{n:1}],
 ["summon","召唤小怪",{n:1}],["say","说话",{text:1}],["enrage","进入狂暴/下一阶段",{}],
];
const ACT=Object.fromEntries(ACTIONS.map(a=>[a[0],a]));

function blankScene(){return {title:"新场景",players:0.4,
  enemies:[{id:uid(),name:"怪A",x:0.7}],
  beats:[{id:uid(),who:"all",action:"idle",n:1,secs:1,text:""}]};}
function sampleScene(){
  const A=uid(),B=uid(),C=uid();
  return {title:"三螳螂",players:0.38,
    enemies:[{id:A,name:"螳A",x:0.66},{id:B,name:"螳B",x:0.8},{id:C,name:"螳C",x:0.94}],
    beats:[
      {id:uid(),who:"all",action:"look",n:1,secs:1,text:""},
      {id:uid(),who:[B],action:"dash",n:1,secs:1,text:""},
      {id:uid(),who:[B],action:"combo",n:3,secs:1,text:""},
      {id:uid(),who:[B],action:"retreat",n:1,secs:1,text:""},
      {id:uid(),who:[A,C],action:"jumpTo",n:1,secs:1,text:""},
      {id:uid(),who:[A,C],action:"attack",n:1,secs:1,text:""},
      {id:uid(),who:[A,C],action:"retreat",n:1,secs:1,text:""},
      {id:uid(),who:"all",action:"enrage",n:1,secs:1,text:"血量50%后"},
      {id:uid(),who:"all",action:"dash",n:1,secs:1,text:""},
    ]};
}
let scene=load()||sampleScene();

function load(){try{const s=localStorage.getItem(LS);if(s)return JSON.parse(s);}catch(e){}return null;}
function save(){try{localStorage.setItem(LS,JSON.stringify(scene));}catch(e){}}
function colorOf(i){return COLORS[i%COLORS.length];}
function entIndex(id){return scene.enemies.findIndex(e=>e.id===id);}
function whoIds(b){return b.who==="all"?scene.enemies.map(e=>e.id):b.who.filter(id=>entIndex(id)>=0);}
function whoNames(b){return b.who==="all"?"全部":whoIds(b).map(id=>{const e=scene.enemies.find(x=>x.id===id);return e?e.name:"?";}).join("、");}

function renderEnts(){
  const c=$("entList");c.innerHTML="";
  scene.enemies.forEach((e,i)=>{
    const r=document.createElement("div");r.className="ent";
    const d=document.createElement("div");d.className="dot";d.style.background=colorOf(i);r.appendChild(d);
    const nm=document.createElement("input");nm.type="text";nm.value=e.name;nm.style.flex="0 0 90px";nm.oninput=()=>{e.name=nm.value;onChange();};r.appendChild(nm);
    const sl=document.createElement("input");sl.type="range";sl.min=0;sl.max=1;sl.step=0.01;sl.value=e.x;sl.oninput=()=>{e.x=+sl.value;onChange();};r.appendChild(sl);
    if(scene.enemies.length>1){const del=document.createElement("button");del.className="btn sm";del.textContent="🗑";del.onclick=()=>{scene.enemies.splice(i,1);scene.beats.forEach(b=>{if(b.who!=="all")b.who=b.who.filter(id=>id!==e.id);});onChange();};r.appendChild(del);}
    c.appendChild(r);
  });
}

function renderBeats(){
  const c=$("beatList");c.innerHTML="";
  scene.beats.forEach((b,i)=>{
    const box=document.createElement("div");box.className="beat"+(i===playIdx&&playing?" now":"");box.id="beat"+i;
    const hd=document.createElement("div");hd.className="bh";
    const num=document.createElement("div");num.className="bnum";num.textContent=(i+1);hd.appendChild(num);
    // 动作
    const sel=document.createElement("select");ACTIONS.forEach(a=>{const o=document.createElement("option");o.value=a[0];o.textContent=a[1];sel.appendChild(o);});
    sel.value=b.action;sel.onchange=()=>{b.action=sel.value;onChange();};hd.appendChild(sel);
    const meta=ACT[b.action][2];
    if(meta.n){const inp=document.createElement("input");inp.type="number";inp.min=1;inp.step=1;inp.value=b.n;inp.style.width="56px";inp.oninput=()=>{b.n=+inp.value;onChange();};hd.appendChild(inp);const s=document.createElement("span");s.className="mini";s.textContent="次/下";hd.appendChild(s);}
    if(meta.secs){const inp=document.createElement("input");inp.type="number";inp.min=0;inp.step=0.5;inp.value=b.secs;inp.style.width="60px";inp.oninput=()=>{b.secs=+inp.value;onChange();};hd.appendChild(inp);const s=document.createElement("span");s.className="mini";s.textContent="秒";hd.appendChild(s);}
    const sp=document.createElement("span");sp.style.flex="1";hd.appendChild(sp);
    const up=document.createElement("button");up.className="btn sm";up.textContent="↑";up.onclick=()=>{if(i>0){[scene.beats[i-1],scene.beats[i]]=[scene.beats[i],scene.beats[i-1]];onChange();}};hd.appendChild(up);
    const dn=document.createElement("button");dn.className="btn sm";dn.textContent="↓";dn.onclick=()=>{if(i<scene.beats.length-1){[scene.beats[i+1],scene.beats[i]]=[scene.beats[i],scene.beats[i+1]];onChange();}};hd.appendChild(dn);
    const del=document.createElement("button");del.className="btn sm";del.textContent="🗑";del.onclick=()=>{scene.beats.splice(i,1);onChange();};hd.appendChild(del);
    box.appendChild(hd);
    // 谁
    const who=document.createElement("div");who.className="who";
    const all=document.createElement("span");all.className="chip"+(b.who==="all"?" on":"");all.textContent="全部";all.onclick=()=>{b.who="all";onChange();};who.appendChild(all);
    scene.enemies.forEach((e,ei)=>{const ids=whoIds(b);const on=b.who!=="all"&&ids.includes(e.id);
      const ch=document.createElement("span");ch.className="chip"+(on?" on":"");ch.textContent=e.name;
      ch.onclick=()=>{let cur=b.who==="all"?scene.enemies.map(x=>x.id):b.who.slice();
        if(cur.includes(e.id))cur=cur.filter(x=>x!==e.id);else cur.push(e.id);
        b.who=(cur.length===scene.enemies.length)?"all":cur;onChange();};who.appendChild(ch);});
    box.appendChild(who);
    // 文字/备注
    if(meta.text){const inp=document.createElement("input");inp.type="text";inp.placeholder="台词…";inp.value=b.text;inp.style.width="100%";inp.oninput=()=>{b.text=inp.value;onChange();};box.appendChild(inp);}
    else{const inp=document.createElement("input");inp.type="text";inp.placeholder="备注（可选，如：血量50%后）";inp.value=b.text;inp.style.width="100%";inp.oninput=()=>{b.text=inp.value;onChange();};box.appendChild(inp);}
    c.appendChild(box);
  });
}

function beatLine(b,i){
  const a=ACT[b.action],meta=a[2];let act=a[1];
  if(meta.n)act+=" "+(b.n||1)+"下";
  if(meta.secs)act+=" "+(b.secs||0)+"秒";
  if(meta.text&&b.text)act+='："'+b.text+'"';
  let s=(i+1)+". "+whoNames(b)+" "+act;
  if(!meta.text&&b.text)s+="  —— "+b.text;
  return s;
}
function sceneText(){
  const L=[];
  L.push("场景: "+scene.title+"（侧视/平台）");
  L.push("出场: "+scene.enemies.map(e=>e.name+"("+posLabel(e.x)+")").join("、"));
  L.push("玩家起始: "+posLabel(scene.players));
  L.push("行动路线:");
  scene.beats.forEach((b,i)=>L.push("  "+beatLine(b,i)));
  L.push("");
  L.push("（数值/手感我来定，做好后你试玩，用游戏里 ⚙调参 面板即时微调）");
  return L.join("\n");
}
function posLabel(x){return x<0.34?"左":x<0.67?"中":"右";}

function onChange(){
  $("sTitle").value=scene.title;$("pPos").value=scene.players;
  renderEnts();renderBeats();
  $("out").value=sceneText()+"\n\n```json\n"+JSON.stringify(scene,null,2)+"\n```";
  save();
}

// ---------- 预览 ----------
const cv=$("stage"),ctx=cv.getContext("2d");
let playing=false,playIdx=0,beatT0=0,loop=false;
let est={},fromX={},flash=0,summons={},enraged=false,speech=null;
function pad(){return 28;}
function X(x){return pad()+x*(cv.width-2*pad());}
function resetPlay(){est={};fromX={};summons={};enraged=false;speech=null;scene.enemies.forEach(e=>{est[e.id]={x:e.x,y:0};});}
function beatDur(b){const m=b.action;
  if(m==="wait")return Math.max(0.2,b.secs||1);
  if(m==="attack"||m==="combo")return 0.32*Math.max(1,b.n||1)+0.25;
  if(m==="say")return 1.5;
  if(m==="approach")return 0.8;if(m==="dash")return 0.5;if(m==="jumpTo")return 0.6;
  if(m==="enrage")return 0.7;return 0.6;}
function targetX(e,act){const p=scene.players;const sign=(est[e.id].x>=p)?1:-1;
  if(act==="approach")return p+sign*0.1;
  if(act==="dash")return p+sign*0.06;
  if(act==="jumpTo")return p+sign*0.07;
  if(act==="circle")return p-sign*0.07;
  if(act==="back")return Math.max(0,Math.min(1,est[e.id].x+sign*0.1));
  if(act==="retreat"){const o=scene.enemies.find(x=>x.id===e.id);return o?o.x:est[e.id].x;}
  return est[e.id].x;}
function startBeat(){const b=scene.beats[playIdx];if(!b)return;beatT0=performance.now();flash=0;
  whoIds(b).forEach(id=>{fromX[id]=est[id]?est[id].x:0.5;});
  if(b.action==="say")speech={ids:whoIds(b),text:b.text||"…"};else speech=null;}
function playAll(){if(!scene.beats.length)return;playing=true;playIdx=0;resetPlay();startBeat();renderBeats();}
function drawStage(){
  const w=cv.width,h=cv.height,gy=h-26;
  ctx.clearRect(0,0,w,h);ctx.fillStyle="#0d1115";ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="#2a3138";ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();
  let curHit=null,capTxt="";
  if(playing){
    const b=scene.beats[playIdx];
    if(!b){playing=false;}
    else{
      const dur=beatDur(b),t=(performance.now()-beatT0)/1000,pr=Math.min(1,t/dur),ids=whoIds(b);
      capTxt="▶ 第"+(playIdx+1)+"拍："+beatLine(b,playIdx).replace(/^\d+\.\s/,"");
      ids.forEach(id=>{if(!est[id])return;const e=scene.enemies.find(x=>x.id===id);
        const tx=targetX(e,b.action),f=fromX[id]!=null?fromX[id]:est[id].x;
        if(["approach","dash","jumpTo","circle","back","retreat"].includes(b.action)){est[id].x=f+(tx-f)*pr;}
        est[id].y=(b.action==="jumpTo")?-34*Math.sin(Math.PI*pr):0;});
      if(b.action==="attack"||b.action==="combo"){const n=Math.max(1,b.n||1);flash=(Math.floor(pr*n*2)%2===0)?1:0;curHit=ids;}
      if(t>=dur){
        if(b.action==="enrage")enraged=true;
        if(b.action==="summon")ids.forEach(id=>summons[id]=(summons[id]||0)+Math.max(1,b.n||1));
        ids.forEach(id=>{if(est[id])est[id].x=targetX(e_dummy(id),b.action),est[id].y=0;});
        playIdx++;
        if(playIdx>=scene.beats.length){if(loop){playIdx=0;resetPlay();startBeat();}else{playing=false;capTxt="✔ 播放完";}}
        else startBeat();
        renderBeats();
      }
    }
  }
  // 玩家
  ctx.fillStyle="#7fd4dd";ctx.fillRect(X(scene.players)-7,gy-30,14,30);
  ctx.fillStyle="#9a958a";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText("玩家",X(scene.players),gy+12);
  // 怪
  scene.enemies.forEach((e,i)=>{const s=est[e.id]||{x:e.x,y:0};const ex=X(s.x),ey=gy-24+s.y;
    ctx.fillStyle=enraged?"#ff6b6b":colorOf(i);ctx.fillRect(ex-8,ey,16,24);
    if(curHit&&curHit.includes(e.id)&&flash){ctx.fillStyle="rgba(255,80,80,.5)";const front=(s.x>=scene.players)?-1:1;ctx.fillRect(ex+front*16-6,ey+2,16,18);}
    ctx.fillStyle="#cfc9bd";ctx.font="10px sans-serif";ctx.textAlign="center";ctx.fillText(e.name,ex,gy+12);
    const sm=summons[e.id]||0;for(let k=0;k<sm;k++){ctx.fillStyle="#b07acc";ctx.fillRect(ex-8-(k+1)*12,gy-12,9,12);}
    if(speech&&speech.ids.includes(e.id)){ctx.fillStyle="#0d1115";ctx.strokeStyle="#5cc0cc";ctx.lineWidth=1;
      const tw=ctx.measureText(speech.text).width+12;ctx.fillRect(ex-tw/2,ey-22,tw,16);ctx.strokeRect(ex-tw/2,ey-22,tw,16);
      ctx.fillStyle="#bfe3d2";ctx.fillText(speech.text,ex,ey-10);}
  });
  $("cap").textContent=capTxt;
  requestAnimationFrame(drawStage);
}
function e_dummy(id){return scene.enemies.find(x=>x.id===id)||{id};}
requestAnimationFrame(drawStage);

// 按钮
$("sTitle").oninput=()=>{scene.title=$("sTitle").value;save();$("out").value=sceneText()+"\n\n```json\n"+JSON.stringify(scene,null,2)+"\n```";};
$("pPos").oninput=()=>{scene.players=+$("pPos").value;onChange();};
$("bAddEnt").onclick=()=>{scene.enemies.push({id:uid(),name:"怪"+String.fromCharCode(65+scene.enemies.length),x:0.6+Math.random()*0.3});onChange();};
$("bAddBeat").onclick=()=>{scene.beats.push({id:uid(),who:"all",action:"dash",n:1,secs:1,text:""});onChange();};
$("bPlay").onclick=playAll;
$("bLoop").onclick=()=>{loop=!loop;$("bLoop").textContent="循环："+(loop?"开":"关");};
$("bNew").onclick=()=>{if(confirm("新建空场景？")){scene=blankScene();onChange();}};
$("bSample").onclick=()=>{if(confirm("载入三螳螂示例？")){scene=sampleScene();onChange();}};
$("bExport").onclick=()=>{const blob=new Blob([JSON.stringify(scene,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(scene.title||"scene")+".json";a.click();};
$("bImport").onclick=()=>$("fileIn").click();
$("fileIn").onchange=async e=>{const f=e.target.files[0];if(!f)return;try{scene=Object.assign(blankScene(),JSON.parse(await f.text()));onChange();}catch(err){alert("解析失败");}};
$("bCopy").onclick=async()=>{try{await navigator.clipboard.writeText(sceneText());$("bCopy").textContent="已复制✓";setTimeout(()=>$("bCopy").textContent="复制给AI",1200);}catch(e){$("out").select();}};

onChange();
</script>
</body>
</html>
