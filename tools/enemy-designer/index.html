<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>怪物设计器 · AI Game Engine</title>
<style>
  :root{--ink:#eae6dd;--muted:#9a958a;--panel:#1d2226;--panel2:#262c31;--line:#333b41;--clay:#cc785c;--accent:#5cc0cc;--sel:#ffd24a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#11151a;color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}
  .topbar{position:sticky;top:0;display:flex;align-items:center;gap:6px;padding:8px;background:rgba(20,25,29,.96);
    border-bottom:1px solid var(--line);z-index:10;flex-wrap:wrap;}
  .title{font-size:15px;font-weight:700;margin-right:auto;}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:8px;
    padding:7px 10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn:active{background:#30373d;} .btn.p{background:var(--clay);border-color:var(--clay);}
  .btn.sm{padding:5px 8px;font-size:12px;}
  .wrap{display:flex;gap:12px;padding:12px;align-items:flex-start;flex-wrap:wrap;}
  .col{flex:1 1 380px;min-width:300px;}
  .preview{flex:1 1 340px;min-width:300px;position:sticky;top:60px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px;}
  .card h3{margin:0 0 8px;font-size:14px;}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:13px;flex-wrap:wrap;}
  .row label{flex:0 0 96px;color:var(--muted);}
  input[type=text],input[type=number],select{background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:7px;padding:7px;font-size:13px;flex:1;min-width:60px;}
  input[type=range]{flex:1;}
  input[type=checkbox]{width:18px;height:18px;}
  .atk{border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;background:var(--panel2);}
  .atk.sel{outline:2px solid var(--accent);}
  .atk .ahdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .atk .ahdr input{font-weight:700;}
  .tag{font-size:11px;color:var(--muted);}
  canvas{background:#0d1115;border:1px solid var(--line);border-radius:8px;display:block;width:100%;}
  .tl{height:34px;border-radius:6px;overflow:hidden;display:flex;margin:8px 0;border:1px solid var(--line);position:relative;}
  .tl .seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0b1118;white-space:nowrap;}
  .tl .ph{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 6px #fff;}
  .hint{font-size:12px;color:var(--muted);}
  .pill{font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:2px 8px;color:var(--muted);}
  textarea{width:100%;height:120px;background:#0d1115;color:var(--ink);border:1px solid var(--line);border-radius:8px;font-family:monospace;font-size:12px;padding:8px;}
  .chk{display:flex;align-items:center;gap:4px;font-size:12px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="title">🐲 怪物设计器</div>
  <button class="btn sm" id="bNew">新建</button>
  <button class="btn sm" id="bCopy">复制给AI</button>
  <button class="btn sm" id="bExport">导出spec</button>
  <button class="btn sm" id="bImport">导入</button>
  <input type="file" id="fileIn" accept="application/json" style="display:none">
</div>

<div class="wrap">
  <div class="col">
    <div class="card" id="cBasic"><h3>基本</h3></div>
    <div class="card" id="cAI"><h3>AI · 选招与节奏</h3></div>
    <div class="card" id="cPhase"><h3>阶段</h3><div id="phaseList"></div><button class="btn sm" id="bAddPhase">＋ 加阶段</button></div>
    <div class="card"><h3>招式</h3><div id="atkList"></div><button class="btn sm p" id="bAddAtk">＋ 加招式</button></div>
  </div>
  <div class="preview">
    <div class="card">
      <h3>预览 <span class="pill" id="pvName"></span></h3>
      <canvas id="stage" width="360" height="210"></canvas>
      <div class="tl" id="timeline"></div>
      <div class="row" style="justify-content:center">
        <button class="btn p" id="bPlay">▶ 播放此招</button>
        <button class="btn sm" id="bLoop">循环：关</button>
        <label class="chk"><input type="checkbox" id="cDash"> 演示移动</label>
      </div>
      <div class="hint" id="pvInfo"></div>
    </div>
    <div class="card"><h3>spec 文本（可复制/编辑）</h3><textarea id="specOut" spellcheck="false"></textarea></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const LS="aiengine.enemyDesigner.v1";
function uid(){return Math.random().toString(36).slice(2,8);}

function blankAttack(){return {id:uid(),name:"新招式",teleDur:0.5,activeDur:0.18,recovery:0.8,
  reach:40,hbW:50,hbH:60,hbYOff:0,dmg:12,knockback:160,parryable:true,parryResult:"硬直",move:"none",moveSpeed:300};}
function blankSpec(){return {
  name:"新怪物",hp:120,parryDeaths:3,bodyW:40,bodyH:70,speed:150,facesLeft:false,
  selectMode:"random",engageRange:120,keepDistance:0,gapDur:0.6,
  phases:[{name:"阶段1",trigType:"none",trigVal:50,speedMul:1.0,atks:[]}],
  attacks:[blankAttack()]
};}
let spec=load()||blankSpec();
let curAtk=spec.attacks[0]?spec.attacks[0].id:null;

function load(){try{const s=localStorage.getItem(LS);if(s)return JSON.parse(s);}catch(e){}return null;}
function save(){try{localStorage.setItem(LS,JSON.stringify(spec));}catch(e){}}

// ---- 通用输入控件 ----
function field(parent,label,obj,key,type,opts){
  opts=opts||{};
  const r=document.createElement("div");r.className="row";
  const l=document.createElement("label");l.textContent=label;r.appendChild(l);
  let inp;
  if(type==="select"){inp=document.createElement("select");opts.options.forEach(o=>{const op=document.createElement("option");op.value=o[0];op.textContent=o[1];inp.appendChild(op);});inp.value=obj[key];}
  else if(type==="check"){inp=document.createElement("input");inp.type="checkbox";inp.checked=!!obj[key];}
  else{inp=document.createElement("input");inp.type=type;inp.value=obj[key];if(type==="number"){inp.step=opts.step||"any";if(opts.min!=null)inp.min=opts.min;if(opts.max!=null)inp.max=opts.max;}}
  inp.oninput=()=>{obj[key]= type==="check"?inp.checked : (type==="number"?(+inp.value):inp.value); onChange();};
  r.appendChild(inp);
  if(opts.unit){const u=document.createElement("span");u.className="tag";u.textContent=opts.unit;r.appendChild(u);}
  parent.appendChild(r);
  return inp;
}

function renderBasic(){
  const c=$("cBasic");c.innerHTML="<h3>基本</h3>";
  field(c,"名字",spec,"name","text");
  field(c,"血量",spec,"hp","number",{min:1,step:1});
  field(c,"弹反几次死",spec,"parryDeaths","number",{min:0,step:1,unit:"0=不靠弹反"});
  field(c,"体宽",spec,"bodyW","number",{min:1,step:1,unit:"px"});
  field(c,"体高",spec,"bodyH","number",{min:1,step:1,unit:"px"});
  field(c,"移动速度",spec,"speed","number",{min:0,step:5,unit:"px/s"});
  field(c,"素材朝左",spec,"facesLeft","check");
}
function renderAI(){
  const c=$("cAI");c.innerHTML="<h3>AI · 选招与节奏</h3>";
  field(c,"选招方式",spec,"selectMode","select",{options:[["random","随机"],["sequence","固定顺序循环"],["distance","按距离选"]]});
  field(c,"交战距离",spec,"engageRange","number",{min:0,step:5,unit:"px 进到这才出招"});
  field(c,"保持距离",spec,"keepDistance","number",{min:0,step:5,unit:"px 0=贴脸"});
  field(c,"招间隔",spec,"gapDur","number",{min:0,step:0.05,unit:"s 一招一停的空隙"});
}
function renderPhases(){
  const list=$("phaseList");list.innerHTML="";
  spec.phases.forEach((ph,i)=>{
    const box=document.createElement("div");box.className="atk";
    const h=document.createElement("div");h.className="ahdr";
    const nm=document.createElement("input");nm.type="text";nm.value=ph.name;nm.oninput=()=>{ph.name=nm.value;onChange();};
    h.appendChild(nm);
    if(spec.phases.length>1){const del=document.createElement("button");del.className="btn sm";del.textContent="🗑";del.onclick=()=>{spec.phases.splice(i,1);onChange();};h.appendChild(del);}
    box.appendChild(h);
    field(box,"触发",ph,"trigType","select",{options:[["none","开场就在"],["hp","血量≤%"],["hits","受击次数≥"],["time","时间≥s"]]});
    if(ph.trigType!=="none")field(box,"触发值",ph,"trigVal","number",{step:1});
    field(box,"速度倍率",ph,"speedMul","number",{step:0.1,unit:"×"});
    // 启用招式
    const r=document.createElement("div");r.className="row";r.innerHTML='<label>启用招式</label>';
    const wrap=document.createElement("div");wrap.style.cssText="display:flex;flex-wrap:wrap;gap:8px;flex:1";
    spec.attacks.forEach(a=>{const lab=document.createElement("label");lab.className="chk";
      const cb=document.createElement("input");cb.type="checkbox";cb.checked=ph.atks.includes(a.id);
      cb.onchange=()=>{if(cb.checked){if(!ph.atks.includes(a.id))ph.atks.push(a.id);}else{ph.atks=ph.atks.filter(x=>x!==a.id);}onChange();};
      lab.appendChild(cb);lab.appendChild(document.createTextNode(a.name));wrap.appendChild(lab);});
    r.appendChild(wrap);box.appendChild(r);
    list.appendChild(box);
  });
}
function renderAttacks(){
  const list=$("atkList");list.innerHTML="";
  spec.attacks.forEach((a,i)=>{
    const box=document.createElement("div");box.className="atk"+(a.id===curAtk?" sel":"");
    const h=document.createElement("div");h.className="ahdr";
    const nm=document.createElement("input");nm.type="text";nm.value=a.name;nm.oninput=()=>{a.name=nm.value;onChange();};
    h.appendChild(nm);
    const pv=document.createElement("button");pv.className="btn sm";pv.textContent="▶预览";pv.onclick=()=>{curAtk=a.id;onChange();playAtk();};
    h.appendChild(pv);
    const del=document.createElement("button");del.className="btn sm";del.textContent="🗑";del.onclick=()=>{spec.attacks.splice(i,1);if(curAtk===a.id)curAtk=spec.attacks[0]&&spec.attacks[0].id;onChange();};
    h.appendChild(del);
    box.appendChild(h);
    box.onclick=(e)=>{if(e.target===box){curAtk=a.id;onChange();}};
    field(box,"前摇",a,"teleDur","number",{min:0,step:0.05,unit:"s 预警/蓄力"});
    field(box,"判定时长",a,"activeDur","number",{min:0.02,step:0.02,unit:"s 攻击框存在"});
    field(box,"后摇",a,"recovery","number",{min:0,step:0.05,unit:"s 打完僵直(可打)"});
    field(box,"判定前伸",a,"reach","number",{step:2,unit:"px 框离身体多远"});
    field(box,"判定长",a,"hbW","number",{step:2,unit:"px 朝前的长度"});
    field(box,"判定高",a,"hbH","number",{step:2,unit:"px"});
    field(box,"判定Y偏",a,"hbYOff","number",{step:2,unit:"px 负=偏上"});
    field(box,"伤害",a,"dmg","number",{step:1});
    field(box,"击退",a,"knockback","number",{step:10,unit:"px/s"});
    field(box,"可弹反",a,"parryable","check");
    field(box,"弹反后果",a,"parryResult","select",{options:[["硬直","硬直(处决窗)"],["必死","直接死"],["反弹","反弹/被弹飞"]]});
    field(box,"攻击移动",a,"move","select",{options:[["none","原地"],["dash","向前冲"],["jump","跳起下砸"]]});
    field(box,"移动速度",a,"moveSpeed","number",{step:20,unit:"px/s"});
    list.appendChild(box);
  });
}

function curAttack(){return spec.attacks.find(a=>a.id===curAtk);}

function renderTimeline(){
  const a=curAttack(), tl=$("timeline");tl.innerHTML="";
  if(!a){return;}
  const total=a.teleDur+a.activeDur+a.recovery||1;
  const segs=[["前摇",a.teleDur,"#ffd24a"],["判定",a.activeDur,"#ff6b6b"],["后摇",a.recovery,"#7a8690"]];
  segs.forEach(([t,d,col])=>{const s=document.createElement("div");s.className="seg";s.style.flex=Math.max(0.001,d);s.style.background=col;
    s.textContent=(d>=0.06)?(t+" "+d.toFixed(2)+"s"):"";tl.appendChild(s);});
  const ph=document.createElement("div");ph.className="ph";ph.id="tlph";ph.style.left="0%";tl.appendChild(ph);
}

function specText(){
  const lines=[];
  lines.push("怪物: "+spec.name);
  lines.push("血量: "+spec.hp+(spec.parryDeaths>0?(" (弹反"+spec.parryDeaths+"次死)"):""));
  lines.push("体型: "+spec.bodyW+"×"+spec.bodyH+", 速度 "+spec.speed+(spec.facesLeft?", 素材朝左":""));
  lines.push("AI: 选招="+({random:"随机",sequence:"顺序循环",distance:"按距离"}[spec.selectMode])+", 交战距离 "+spec.engageRange+", 保持距离 "+spec.keepDistance+", 招间隔 "+spec.gapDur+"s");
  lines.push("阶段:");
  spec.phases.forEach(ph=>{const trig={none:"开场就在",hp:"血量≤"+ph.trigVal+"%",hits:"受击≥"+ph.trigVal,time:"时间≥"+ph.trigVal+"s"}[ph.trigType];
    const names=ph.atks.map(id=>{const a=spec.attacks.find(x=>x.id===id);return a?a.name:"?";});
    lines.push("  - "+ph.name+": 触发["+trig+"], 速度×"+ph.speedMul+", 启用招式["+(names.join("、")||"未选")+"]");});
  lines.push("招式:");
  spec.attacks.forEach(a=>{lines.push("  - "+a.name+": 前摇"+a.teleDur+"s → 判定"+a.activeDur+"s → 后摇"+a.recovery+"s; "+
    "判定框[前伸"+a.reach+" 长"+a.hbW+" 高"+a.hbH+" Y偏"+a.hbYOff+"]; 伤害"+a.dmg+" 击退"+a.knockback+"; "+
    "弹反"+(a.parryable?("可("+a.parryResult+")"):"不可")+"; 移动"+({none:"原地",dash:"向前冲",jump:"跳起下砸"}[a.move])+(a.move!=="none"?("@"+a.moveSpeed):""));});
  return lines.join("\n");
}

function onChange(){
  renderPhases();renderAttacks();renderTimeline();
  $("pvName").textContent=(curAttack()&&curAttack().name)||"";
  $("specOut").value=specText()+"\n\n```json\n"+JSON.stringify(spec,null,2)+"\n```";
  save();
}

// ---- 预览舞台 ----
const cv=$("stage"), ctx=cv.getContext("2d");
let play=null; // {t0, a}
let loop=false;
function playAtk(){const a=curAttack();if(!a)return;play={t0:performance.now(),a};}
function drawStage(){
  const w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#0d1115";ctx.fillRect(0,0,w,h);
  // 地面
  const gy=h-30;ctx.strokeStyle="#2a3138";ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();
  // 玩家(左) 与 怪(右)
  const px=70, ex0=250;
  const a=curAttack();
  let ex=ex0, ey=0, tint=null, showHb=false, phase="";
  if(play&&a){
    const t=(performance.now()-play.t0)/1000;
    const T=play.a.teleDur, A=play.a.activeDur, R=play.a.recovery, total=T+A+R;
    if(t>=total){ if(loop){play.t0=performance.now();} else {play=null;} }
    else{
      let frac;
      if(t<T){phase="前摇";tint="#ffd24a";frac=t/total; if(play.a.move==="dash")ex=ex0+8*(t/T); if(play.a.move==="jump")ey=-50*(t/T);}
      else if(t<T+A){phase="判定";tint="#ff6b6b";showHb=true;
        const at=(t-T)/A;
        if(play.a.move==="dash")ex=ex0 - (ex0-px-60)*at;          // 冲向玩家
        if(play.a.move==="jump"){ey=-50+ (50)*at;}                 // 砸下
      }
      else{phase="后摇";tint="#7a8690"; const rt=(t-T-A)/R; if(play.a.move==="dash")ex=(ex0 - (ex0-px-60)) + ((ex0)-(ex0-(ex0-px-60)))*rt;}
      // 时间轴playhead
      const php=$("tlph"); if(php) php.style.left=(100*t/total)+"%";
    }
  }
  const bw=Math.max(8,spec.bodyW*0.6), bh=Math.max(8,spec.bodyH*0.6);
  // 玩家
  ctx.fillStyle="#5cc0cc";ctx.fillRect(px-12,gy-44,24,44);
  // 怪
  ctx.save();
  ctx.fillStyle=tint||"#c98b6b";
  ctx.fillRect(ex-bw/2, gy-bh+ey, bw, bh);
  ctx.restore();
  // 判定框(朝玩家方向=左)
  if(showHb&&a){
    const front=ex-bw/2;                       // 怪朝左,前方=左侧
    const hx=front - a.reach - a.hbW*0.4;
    const hy=gy-bh*0.6 + a.hbYOff*0.6 + ey;
    ctx.fillStyle="rgba(255,80,80,.35)";ctx.strokeStyle="#ff5a5a";ctx.lineWidth=2;
    const HW=a.hbW*0.6, HH=a.hbH*0.6;
    ctx.fillRect(hx-HW/2,hy-HH/2,HW,HH);ctx.strokeRect(hx-HW/2,hy-HH/2,HW,HH);
  }
  // 文字
  ctx.fillStyle="#9a958a";ctx.font="11px sans-serif";ctx.textAlign="left";
  ctx.fillText("玩家",px-12,gy+14);ctx.fillText(spec.name,ex-bw/2,gy+14);
  if(phase){ctx.fillStyle=tint;ctx.font="bold 13px sans-serif";ctx.textAlign="center";ctx.fillText(phase,w/2,20);}
  requestAnimationFrame(drawStage);
}
requestAnimationFrame(drawStage);

// ---- 按钮 ----
$("bAddAtk").onclick=()=>{const a=blankAttack();spec.attacks.push(a);curAtk=a.id;onChange();};
$("bAddPhase").onclick=()=>{spec.phases.push({name:"阶段"+(spec.phases.length+1),trigType:"hp",trigVal:50,speedMul:1.0,atks:[]});onChange();};
$("bPlay").onclick=playAtk;
$("bLoop").onclick=()=>{loop=!loop;$("bLoop").textContent="循环："+(loop?"开":"关");};
$("bNew").onclick=()=>{if(confirm("新建空白怪物？")){spec=blankSpec();curAtk=spec.attacks[0].id;onChange();}};
$("bExport").onclick=()=>{const blob=new Blob([JSON.stringify(spec,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(spec.name||"enemy")+".json";a.click();};
$("bImport").onclick=()=>$("fileIn").click();
$("fileIn").onchange=async e=>{const f=e.target.files[0];if(!f)return;
  try{spec=JSON.parse(await f.text());if(!spec.attacks)spec.attacks=[blankAttack()];if(!spec.phases)spec.phases=[{name:"阶段1",trigType:"none",trigVal:50,speedMul:1,atks:[]}];curAtk=spec.attacks[0]&&spec.attacks[0].id;onChange();}catch(err){alert("解析失败");}};
$("bCopy").onclick=async()=>{try{await navigator.clipboard.writeText(specText());$("bCopy").textContent="已复制✓";setTimeout(()=>$("bCopy").textContent="复制给AI",1200);}catch(e){$("specOut").select();}};

renderBasic();renderAI();onChange();
</script>
</body>
</html>
