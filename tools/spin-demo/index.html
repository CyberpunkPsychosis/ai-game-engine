<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>转圈 + 平滑跟随 Demo</title>
<style>
  :root{--ink:#eae6dd;--muted:#9a958a;--panel:#1d2226;--line:#333b41;--clay:#cc785c;--accent:#5cc0cc;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#0d1115;color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;}
  #stage{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  .panel{position:fixed;left:10px;top:10px;background:rgba(29,34,38,.92);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;width:268px;backdrop-filter:blur(4px);}
  .panel h1{font-size:15px;margin:0 0 2px;}
  .panel .sub{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
  .row{display:flex;align-items:center;gap:8px;margin:9px 0;font-size:13px;}
  .row label{flex:0 0 96px;color:var(--muted);}
  .row .val{flex:0 0 40px;text-align:right;color:var(--accent);font-variant-numeric:tabular-nums;}
  input[type=range]{flex:1;}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
  .tip{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.55;border-top:1px solid var(--line);padding-top:8px;}
  code{background:#11161b;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:#bfe3d2;font-size:12px;}
  .hide{position:fixed;right:10px;top:10px;font-size:12px;color:var(--muted);background:rgba(29,34,38,.85);
    border:1px solid var(--line);border-radius:8px;padding:6px 10px;}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="panel">
  <h1>🌀 转圈 + 平滑跟随</h1>
  <div class="sub">移动鼠标 / 手指拖动 → 圈心追过去。甩快了它会<b>慢半拍跟上</b>（拖影感）。</div>
  <div class="row"><label>半径 radius</label><input id="radius" type="range" min="20" max="240" step="2" value="110"><span class="val" id="vR"></span></div>
  <div class="row"><label>转速 angular</label><input id="ang" type="range" min="0" max="8" step="0.1" value="3.1"><span class="val" id="vA"></span></div>
  <div class="row"><label>跟随 follow</label><input id="follow" type="range" min="0.02" max="0.5" step="0.01" value="0.10"><span class="val" id="vF"></span></div>
  <div class="row"><label class="chk"><input id="trail" type="checkbox" checked> 残影拖尾</label></div>
  <div class="row"><label class="chk"><input id="selfspin" type="checkbox" checked> 自身也旋转</label></div>
  <div class="tip">
    <b>follow 越小越拖</b>（0.05黏糊糊 / 0.3跟手）。这就是手感旋钮。<br>
    核心代码：<br>
    <code>center = center.lerp(鼠标, follow)</code><br>
    <code>pos = center + RIGHT.rotated(angle)*radius</code>
  </div>
</div>
<div class="hide">圈心(灰) → 目标(白)：看它俩的差就是"拖"</div>

<script>
const cv=document.getElementById("stage"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
function resize(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener("resize",resize);resize();

// 状态
let center={x:W/2,y:H/2};
let target={x:W/2,y:H/2};
let angle=0;
let trail=[];               // 残影位置历史
let last=performance.now();

// 控件
const $=id=>document.getElementById(id);
function num(id){return parseFloat($(id).value);}
function refreshLabels(){$("vR").textContent=num("radius");$("vA").textContent=num("ang").toFixed(1);$("vF").textContent=num("follow").toFixed(2);}
["radius","ang","follow"].forEach(id=>$(id).addEventListener("input",refreshLabels));refreshLabels();

// 指针（鼠标+触摸统一）
function setTarget(ev){const r=cv.getBoundingClientRect();target.x=ev.clientX-r.left;target.y=ev.clientY-r.top;}
cv.addEventListener("pointermove",setTarget);
cv.addEventListener("pointerdown",setTarget);

function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  const radius=num("radius"), angSpeed=num("ang"), follow=num("follow");

  // 平滑跟随：圈心朝目标挪 follow 比例（这就是 lerp）
  center.x += (target.x-center.x)*follow;
  center.y += (target.y-center.y)*follow;

  angle += angSpeed*dt;

  // 绕圈位置 = 圈心 + 绕转的偏移
  const px=center.x+Math.cos(angle)*radius;
  const py=center.y+Math.sin(angle)*radius;

  // 残影
  if($("trail").checked){trail.push({x:px,y:py});if(trail.length>26)trail.shift();}
  else trail.length=0;

  // ---- 画 ----
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#0d1115";ctx.fillRect(0,0,W,H);

  // 目标点(白) 与 圈心(灰) + 半径圈
  ctx.strokeStyle="rgba(255,255,255,.08)";ctx.beginPath();ctx.arc(center.x,center.y,radius,0,7);ctx.stroke();
  ctx.fillStyle="rgba(255,255,255,.5)";ctx.beginPath();ctx.arc(target.x,target.y,4,0,7);ctx.fill();
  ctx.fillStyle="rgba(150,160,168,.6)";ctx.beginPath();ctx.arc(center.x,center.y,5,0,7);ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.15)";ctx.beginPath();ctx.moveTo(center.x,center.y);ctx.lineTo(target.x,target.y);ctx.stroke();

  // 残影（旧→新，越新越亮）
  trail.forEach((p,i)=>{const a=(i+1)/trail.length*0.5;ctx.fillStyle="rgba(204,120,92,"+a+")";
    const s=10+i/trail.length*8;ctx.fillRect(p.x-s/2,p.y-s/2,s,s);});

  // 主体（会自身旋转的方块 + 朝向小三角）
  ctx.save();ctx.translate(px,py);ctx.rotate($("selfspin").checked?angle*2:0);
  ctx.fillStyle="#cc785c";ctx.fillRect(-13,-13,26,26);
  ctx.fillStyle="#ffd9c2";ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(4,-7);ctx.lineTo(4,7);ctx.closePath();ctx.fill();
  ctx.restore();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
