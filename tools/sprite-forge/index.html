<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>精灵铸造 · 抽卡生成（fal）</title>
<style>
  :root{--bg:#15171c;--panel:#1e2128;--line:#2c313b;--txt:#e6e8ec;--mut:#8a93a3;--acc:#33d6c0;--acc2:#e0784f;--warn:#e0c14f;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.5 -apple-system,system-ui,"PingFang SC","Microsoft YaHei",sans-serif}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 10px}
  h1{font-size:16px;margin:0 0 6px}
  .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:6px 0}
  .grow{flex:1;min-width:0}
  input[type=text],input[type=password],input[type=number],textarea,select{
    background:#12141a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font:inherit;width:100%}
  textarea{min-height:64px;resize:vertical}
  .btn{background:#2a2f3a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 13px;font:inherit;font-weight:600;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.p{background:var(--acc);color:#05201c;border-color:var(--acc)}
  .btn.o{background:var(--acc2);color:#2a0f06;border-color:var(--acc2)}
  .btn.sm{padding:6px 9px;font-size:13px;font-weight:500}
  .btn[disabled]{opacity:.45;pointer-events:none}
  .chip{background:#222732;border:1px solid var(--line);border-radius:16px;padding:6px 11px;font-size:13px;cursor:pointer}
  .chip.on{background:var(--acc);color:#05201c;border-color:var(--acc)}
  main{padding:10px;max-width:760px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0}
  .tabs{display:flex;gap:6px;margin:8px 0}
  .tab{flex:1;text-align:center;padding:10px;border:1px solid var(--line);border-radius:10px;background:#1a1d24;cursor:pointer;font-weight:700}
  .tab.on{background:var(--acc);color:#05201c;border-color:var(--acc)}
  .hint{color:var(--mut);font-size:12.5px;margin:4px 0}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .cand{position:relative;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#0c0d11}
  .cand img{width:100%;display:block}
  .cand .ov{position:absolute;left:0;right:0;bottom:0;display:flex;gap:4px;padding:5px;background:linear-gradient(transparent,#000a)}
  .cand.sel{outline:2px solid var(--acc)}
  label{color:var(--mut);font-size:13px;white-space:nowrap}
  video{width:100%;border-radius:8px;background:#000}
  #log{font:12px/1.45 ui-monospace,Menlo,monospace;color:var(--mut);white-space:pre-wrap;max-height:160px;overflow:auto;background:#101218;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px}
  a.dl{color:var(--acc);font-size:13px;text-decoration:none}
  .bal{font-weight:700}
  .hidden{display:none}
  .warn{color:var(--warn);font-size:12px}
</style>
</head>
<body>
<header>
  <h1>🔨 精灵铸造 — 自己抽卡（fal.ai）</h1>
  <div class="row">
    <input type="password" id="key" class="grow" placeholder="粘贴你的 fal API Key（只存本机浏览器，不上传）" autocomplete="off">
    <button class="btn sm" id="saveKey">保存</button>
    <button class="btn sm" id="testKey">测余额</button>
  </div>
  <div class="hint">余额：<span class="bal" id="bal">—</span> · <span class="warn">key 存在你浏览器 localStorage，这是你自己的私人工具页，别把 key 截图发人。</span></div>
</header>

<main>
  <div class="tabs">
    <div class="tab on" data-tab="gen">① 出角色（图）</div>
    <div class="tab" data-tab="anim">② 出动作（视频）</div>
  </div>

  <!-- ========== Tab 1: 出角色 ========== -->
  <section id="tab-gen">
    <div class="card">
      <div class="row"><b>画风预设</b><span class="hint">点一下填进提示词，可再改</span></div>
      <div class="row" id="stylePresets"></div>
      <label>提示词（英文效果最好）</label>
      <textarea id="genPrompt" placeholder="角色描述…"></textarea>
      <div class="row">
        <label>模式</label>
        <select id="genMode" class="grow">
          <option value="t2i">文生图（纯靠描述）</option>
          <option value="i2i">图生图（喂一张参考截图，照风格出）</option>
        </select>
      </div>
      <div class="row" id="refRow" style="display:none">
        <button class="btn sm" id="pickRef">📂 选参考图</button>
        <input type="file" id="refFile" accept="image/*" class="hidden">
        <span class="hint" id="refName">未选</span>
      </div>
      <div class="row">
        <label>张数</label><input type="number" id="genN" value="4" min="1" max="6" style="width:70px">
        <label>画幅</label>
        <select id="genSize" style="width:auto">
          <option value="portrait_4_3">竖 3:4</option>
          <option value="square">方 1:1</option>
          <option value="portrait_16_9">竖 9:16</option>
        </select>
        <button class="btn p grow" id="genBtn">🎲 抽角色</button>
      </div>
      <div class="hint">≈ $0.03/张。出来后点选一张「设为底图」，再去第②步出动作。</div>
      <div class="grid" id="genResults" style="margin-top:8px"></div>
    </div>
  </section>

  <!-- ========== Tab 2: 出动作 ========== -->
  <section id="tab-anim" class="hidden">
    <div class="card">
      <div class="row"><b>底图</b><span class="hint">第①步选的，或自己传一张</span></div>
      <div class="row">
        <button class="btn sm" id="pickBase">📂 换底图</button>
        <input type="file" id="baseFile" accept="image/*" class="hidden">
        <span class="hint" id="baseName">无</span>
      </div>
      <img id="basePrev" style="max-height:160px;border-radius:8px;display:none;margin:6px 0">
      <div class="row"><b>动作预设</b></div>
      <div class="row" id="motionPresets"></div>
      <label>动作描述（英文）</label>
      <textarea id="motionPrompt" placeholder="动作描述…"></textarea>
      <div class="row">
        <span class="chip on" id="loopToggle" data-on="1">🔁 首尾帧循环（待机/跑步用）</span>
        <span class="chip on" id="camToggle" data-on="1">🎥 锁机位（防出画）</span>
      </div>
      <div class="row">
        <label>分辨率</label>
        <select id="res" style="width:auto"><option>480p</option><option selected>720p</option><option>1080p</option></select>
        <label>时长</label>
        <select id="dur" style="width:auto"><option>4</option><option selected>5</option><option>6</option></select>
        <button class="btn o grow" id="animBtn">🎬 出动作视频</button>
      </div>
      <div class="hint">≈ $0.26/条（720p·5s）。出来后下载 mp4，拿去 <a class="dl" href="../sprite-keyer/">sprite-keyer</a> 抽帧抠图。</div>
      <div id="animResult" style="margin-top:8px"></div>
    </div>
  </section>

  <div id="log">就绪。先填 key → 测余额。</div>
</main>

<script type="module">
import { fal } from "https://esm.sh/@fal-ai/client@1";

const $ = s => document.querySelector(s);
const logEl = $('#log');
const log = (m) => { logEl.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + logEl.textContent; };

// ---------- key ----------
let KEY = localStorage.getItem('fal_key') || '';
if (KEY) $('#key').value = KEY;
function applyKey(){ KEY = $('#key').value.trim(); fal.config({ credentials: KEY }); }
applyKey();
$('#saveKey').onclick = () => { applyKey(); localStorage.setItem('fal_key', KEY); log('key 已保存到本机。'); };
$('#testKey').onclick = async () => {
  applyKey();
  if (!KEY){ log('先粘贴 key。'); return; }
  try{
    const r = await fetch('https://rest.alpha.fal.ai/billing/user_balance', { headers:{ Authorization:'Key '+KEY }});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const b = await r.text();
    $('#bal').textContent = '$' + parseFloat(b).toFixed(2);
    log('key 有效，余额 $' + parseFloat(b).toFixed(2));
  }catch(e){ $('#bal').textContent='(查不到)'; log('余额接口被浏览器 CORS 拦了也没关系，能出图就说明 key 没问题。详情：'+e.message); }
};

// ---------- tabs ----------
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t));
  $('#tab-gen').classList.toggle('hidden', t.dataset.tab!=='gen');
  $('#tab-anim').classList.toggle('hidden', t.dataset.tab!=='anim');
});

// ---------- 画风预设 ----------
const SUFFIX = "STRICT side view facing right, full body head to toe, centered with margin, plain flat dark gray background, no ground line, no shadow, single character only.";
const STYLES = {
  "死亡细胞剪影": "2D action platformer game character sprite, Dead Cells inspired: a lone agile warrior with glowing teal-cyan energy rim light and dark silhouette body, holding a sword, dynamic grounded standing pose, painterly pixel-art with crisp readable shapes. "+SUFFIX,
  "通用像素武士": "16-bit pixel art game character, a samurai warrior in dark kimono with a sheathed sword, clean readable pixel sprite, limited palette, standing idle. "+SUFFIX,
  "暗黑骑士": "2D side-scroller pixel art knight in dark armor with a glowing blade, moody rim light, grounded ready stance, crisp pixel sprite. "+SUFFIX,
  "忍者": "pixel art ninja game character, agile, dark outfit with a scarf, holding a kunai, side-scroller sprite, clean shapes. "+SUFFIX,
};
const sp = $('#stylePresets');
Object.keys(STYLES).forEach(k=>{
  const c=document.createElement('span'); c.className='chip'; c.textContent=k;
  c.onclick=()=>{ $('#genPrompt').value = STYLES[k]; };
  sp.appendChild(c);
});
$('#genPrompt').value = STYLES["死亡细胞剪影"];

// ---------- 模式: 文生图 / 图生图 ----------
let refFileObj = null;
$('#genMode').onchange = e => { $('#refRow').style.display = e.target.value==='i2i' ? 'flex':'none'; };
$('#pickRef').onclick = ()=>$('#refFile').click();
$('#refFile').onchange = e => { refFileObj = e.target.files[0]||null; $('#refName').textContent = refFileObj?refFileObj.name:'未选'; };

// ---------- 抽角色 ----------
let baseImageUrl = null;   // 选中底图的 fal url（给第②步）
$('#genBtn').onclick = async () => {
  applyKey(); if(!KEY){ log('先填 key。'); return; }
  const prompt = $('#genPrompt').value.trim();
  const n = Math.max(1, Math.min(6, +$('#genN').value||4));
  const size = $('#genSize').value;
  const mode = $('#genMode').value;
  const btn = $('#genBtn'); btn.disabled=true; btn.textContent='出图中…';
  $('#genResults').innerHTML='';
  try{
    let res;
    if(mode==='i2i'){
      if(!refFileObj){ log('图生图模式要先选一张参考图。'); btn.disabled=false; btn.textContent='🎲 抽角色'; return; }
      log('上传参考图…');
      const url = await fal.storage.upload(refFileObj);
      log('生成中（图生图 seedream edit）…');
      res = await fal.subscribe("fal-ai/bytedance/seedream/v4.5/edit", {
        input:{ prompt, image_urls:[url], num_images:n }, logs:false });
    }else{
      log('生成中（文生图 seedream）…');
      res = await fal.subscribe("fal-ai/bytedance/seedream/v4.5/text-to-image", {
        input:{ prompt, num_images:n, image_size:size }, logs:false });
    }
    const imgs = (res.data&&res.data.images)||[];
    log('出了 '+imgs.length+' 张。点一张「设为底图」。');
    imgs.forEach((im,i)=>{
      const d=document.createElement('div'); d.className='cand';
      d.innerHTML = `<img src="${im.url}"><div class="ov">
        <button class="btn sm p" data-act="use">设为底图</button>
        <a class="btn sm" href="${im.url}" download="char_${Date.now()}_${i}.png" target="_blank">下载</a></div>`;
      d.querySelector('[data-act=use]').onclick=()=>{
        document.querySelectorAll('#genResults .cand').forEach(c=>c.classList.remove('sel'));
        d.classList.add('sel'); baseImageUrl=im.url;
        $('#basePrev').src=im.url; $('#basePrev').style.display='block'; $('#baseName').textContent='来自第①步';
        log('已设为底图。去第②步出动作。');
      };
      $('#genResults').appendChild(d);
    });
    $('#testKey').click();
  }catch(e){ log('出错：'+(e.message||e)); }
  btn.disabled=false; btn.textContent='🎲 抽角色';
};

// ---------- 动作预设 ----------
const MOTIONS = {
  "待机": "Idle breathing animation, the character stands in place, only subtle motion: chest and shoulders rise and fall gently, any glow flickers softly. Stays exactly centered and in place.",
  "跑步": "Running animation in place like on a treadmill, legs cycle in a smooth run, arms swing, body leans slightly forward. The character stays centered and does NOT move across the frame.",
  "攻击": "Sword attack animation: a single decisive forward slash with the weapon, then return to neutral. The character stays in place, feet planted.",
  "受击": "Hurt reaction animation: the character flinches and recoils briefly from a hit, then recovers. Stays in place.",
};
const mp = $('#motionPresets');
Object.keys(MOTIONS).forEach(k=>{
  const c=document.createElement('span'); c.className='chip'; c.textContent=k;
  c.onclick=()=>{
    mp.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c));
    $('#motionPrompt').value=MOTIONS[k];
    const loop = (k==='待机'||k==='跑步');
    setToggle($('#loopToggle'), loop);
  };
  mp.appendChild(c);
});
$('#motionPrompt').value = MOTIONS["待机"];
mp.firstChild.classList.add('on');

function setToggle(el,on){ el.dataset.on=on?'1':'0'; el.classList.toggle('on',!!on); }
$('#loopToggle').onclick=()=>setToggle($('#loopToggle'), $('#loopToggle').dataset.on!=='1');
$('#camToggle').onclick=()=>setToggle($('#camToggle'), $('#camToggle').dataset.on!=='1');

// ---------- 换底图（上传） ----------
$('#pickBase').onclick=()=>$('#baseFile').click();
$('#baseFile').onchange=async e=>{
  const f=e.target.files[0]; if(!f) return;
  applyKey(); if(!KEY){ log('先填 key 再传底图（要上传到 fal）。'); return; }
  log('上传底图…');
  try{ baseImageUrl=await fal.storage.upload(f);
    $('#basePrev').src=URL.createObjectURL(f); $('#basePrev').style.display='block'; $('#baseName').textContent=f.name;
    log('底图就绪。'); }catch(err){ log('上传失败：'+err.message); }
};

// ---------- 出动作视频 ----------
$('#animBtn').onclick=async ()=>{
  applyKey(); if(!KEY){ log('先填 key。'); return; }
  if(!baseImageUrl){ log('先在第①步选底图，或上传一张底图。'); return; }
  const prompt=$('#motionPrompt').value.trim();
  const loop=$('#loopToggle').dataset.on==='1';
  const cam=$('#camToggle').dataset.on==='1';
  const input={ prompt, image_url:baseImageUrl, resolution:$('#res').value,
    aspect_ratio:"auto", duration:$('#dur').value, camera_fixed:cam, generate_audio:false };
  if(loop) input.end_image_url=baseImageUrl;   // 首尾帧=同图 → 无缝循环
  const btn=$('#animBtn'); btn.disabled=true; btn.textContent='出视频中（约1分钟）…';
  $('#animResult').innerHTML='';
  try{
    log('Seedance 生成中…（排队+渲染，耐心等）');
    const res=await fal.subscribe("fal-ai/bytedance/seedance/v1.5/pro/image-to-video",{
      input, logs:false });
    const v=res.data&&res.data.video&&res.data.video.url;
    if(!v) throw new Error('没拿到视频 url');
    log('出好了！下载 mp4 → 去 sprite-keyer 抽帧。');
    $('#animResult').innerHTML=`<video src="${v}" controls autoplay loop muted playsinline></video>
      <div class="row"><a class="btn p" href="${v}" download="motion_${Date.now()}.mp4" target="_blank">⬇ 下载 mp4</a>
      <a class="btn" href="../sprite-keyer/" >➡ 去抽帧抠图</a></div>`;
    $('#testKey').click();
  }catch(e){ log('出错：'+(e.message||e)); }
  btn.disabled=false; btn.textContent='🎬 出动作视频';
};

log('用法：① 填 fal key 测余额 → ② 出角色，挑一张设为底图 → ③ 出动作视频，下载 mp4 → ④ 去 sprite-keyer 抽帧抠图导精灵表。');
</script>
</body>
</html>
