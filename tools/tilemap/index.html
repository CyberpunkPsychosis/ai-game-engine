<!doctype html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>瓦片地图编辑器 · AI Game Engine</title>
<style>
  :root{--ink:#eae6dd;--muted:#9a958a;--panel:#1d2226;--panel2:#262c31;--line:#333b41;--clay:#cc785c;--accent:#5cc0cc;--sel:#ffd24a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#11151a;color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;user-select:none;-webkit-user-select:none;}
  #stage{position:fixed;inset:0;touch-action:none;display:block;background:#0d1115;}
  .topbar{position:fixed;top:0;left:0;right:0;height:46px;display:flex;align-items:center;gap:6px;padding:0 8px;
    background:rgba(20,25,29,.95);border-bottom:1px solid var(--line);z-index:20;}
  .topbar .title{font-size:14px;font-weight:700;margin-right:auto;}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:9px;padding:7px 10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn:active{background:#30373d;} .btn.p{background:var(--clay);border-color:var(--clay);} .btn.on{background:var(--accent);color:#04222a;border-color:var(--accent);}
  .layers{position:fixed;top:46px;left:0;right:0;height:36px;display:flex;z-index:19;background:rgba(20,25,29,.9);border-bottom:1px solid var(--line);}
  .layers .lt{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--line);cursor:pointer;}
  .layers .lt.active{color:var(--ink);background:var(--panel2);box-shadow:inset 0 -2px 0 var(--accent);}
  #markWrap{flex-wrap:wrap;gap:8px;padding:10px;}
  .markBtn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;}
  .markBtn.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .markBtn .dot{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;color:#fff;font-size:13px;font-weight:700;}
  .palette{position:fixed;left:0;right:0;bottom:0;height:170px;max-height:85vh;background:rgba(20,25,29,.97);border-top:1px solid var(--line);z-index:18;display:flex;flex-direction:column;}
  #palHandle{flex:0 0 20px;display:flex;align-items:center;justify-content:center;cursor:row-resize;touch-action:none;}
  #palHandle::before{content:"";width:46px;height:4px;border-radius:3px;background:var(--muted);opacity:.65;}
  #palBody{flex:1 1 auto;overflow:auto;padding:8px;}
  #palCanvasWrap{display:inline-block;}
  #palCanvas{image-rendering:pixelated;display:block;touch-action:none;}
  .hint{position:fixed;top:88px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:6px 12px;border-radius:20px;z-index:15;pointer-events:none;opacity:0;transition:opacity .3s;}
  .hint.show{opacity:1;}
  .menu{position:fixed;top:52px;right:8px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px;z-index:30;display:none;flex-direction:column;gap:4px;min-width:170px;}
  .menu.show{display:flex;} .menu .btn{text-align:left;border:none;background:none;} .menu .btn:active{background:var(--panel2);}
  .panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(420px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;z-index:40;display:none;}
  .panel.show{display:block;} .panel h3{margin:0 0 12px;font-size:15px;}
  .row{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:13px;} .row label{flex:0 0 96px;color:var(--muted);}
  .row input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px;font-size:14px;}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none;} .scrim.show{display:block;}
  .pill{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="topbar">
  <div class="title">瓦片地图</div>
  <button class="btn" id="btnPan">✋平移</button>
  <button class="btn on" id="btnPaint">🖌画</button>
  <button class="btn" id="btnErase">🧽擦</button>
  <button class="btn" id="btnBase">📏地基</button>
  <button class="btn p" id="btnMenu">⋯</button>
</div>
<div class="layers" id="layers"></div>

<div class="menu" id="menu">
  <button class="btn" id="mTileset">🧩 载入瓦片集</button>
  <button class="btn" id="mClear">🗑 清空当前层</button>
  <button class="btn" id="mFit">🔭 看全局</button>
  <button class="btn" id="mHome">⌂ 回原点</button>
  <button class="btn" id="mExport">⬇ 导出 JSON</button>
  <button class="btn" id="mImport">⬆ 导入 JSON</button>
  <span class="pill" style="padding:4px 8px">单指=画/擦 · 双指=平移缩放</span>
</div>

<div class="hint" id="hint"></div>
<div class="palette" id="palette"><div id="palHandle" title="上拉/下拉调整高度"></div><div id="palBody"><div id="palEmpty" class="pill">先 ⋯ → 载入瓦片集</div><div id="palCanvasWrap" style="display:none"><canvas id="palCanvas"></canvas></div><div id="markWrap" style="display:none"></div></div></div>

<div class="scrim" id="scrim"></div>
<div class="panel" id="tsPanel">
  <h3>载入瓦片集</h3>
  <div class="pill">内置(点一下即用,适合先画灰盒草稿):</div>
  <div id="tsBuiltin" style="margin:6px 0"></div>
  <div class="pill" style="margin-top:10px">或自定义上传:</div>
  <div class="row"><label>瓦片宽</label><input id="tsW" type="number" value="16"></div>
  <div class="row"><label>瓦片高</label><input id="tsH" type="number" value="16"></div>
  <div class="row"><label>图片</label><input id="tsFile" type="file" accept="image/png,image/*"></div>
  <div class="pill" style="margin:6px 0">选一张规整的 tileset PNG(瓦片等宽高)。</div>
  <button class="btn p" id="tsClose" style="width:100%">关闭</button>
</div>

<input type="file" id="fileIn" accept="application/json" style="display:none">

<script>
const LAYERS=[{id:"bg",name:"背景",solid:false},{id:"main",name:"主层(碰撞)",solid:true},{id:"fg",name:"前景",solid:false}];
// 放置标记类型(主角出生 + 五个怪)。行走路线等以后再加。
const MARKS=[
  {id:"player",  name:"主角",      color:"#5cc0cc", short:"主"},
  {id:"archer",  name:"弓骷髅",    color:"#caa15a", short:"弓"},
  {id:"spearman",name:"矛骷髅",    color:"#9aa0a6", short:"矛"},
  {id:"warrior", name:"剑骷髅",    color:"#b06bd0", short:"剑"},
  {id:"demon",   name:"恶魔史莱姆",color:"#e0533a", short:"魔"},
  {id:"frost",   name:"霜卫",      color:"#4aa0e0", short:"霜"},
];
let marks=new Map();        // "col,row" -> markId
let curMark="archer";
const cv=document.getElementById("stage"), ctx=cv.getContext("2d");
let DPR=Math.min(devicePixelRatio||1,2);
let ts=null;            // {img, tw, th, cols, rows, name}
let layers={};          // id -> Map("col,row"->tileIndex)
LAYERS.forEach(l=>layers[l.id]=new Map());
let curLayer="main", curTile=0, mode="paint";   // paint|erase|pan
let stamp={c0:0,r0:0,c1:0,r1:0};   // 调色板框选的矩形(整块对象)；单格时四角相同
let groundRow=0;   // 地基线所在行：放"整块对象"时底边自动吸到这一行(只管点位置,不用点准行)
// 扫描瓦片集，记下"全透明的空格"下标，盖章时跳过(免得空格也算进碰撞)
function computeEmpty(t){
  const cv2=document.createElement("canvas");cv2.width=t.img.width;cv2.height=t.img.height;
  const g=cv2.getContext("2d");g.drawImage(t.img,0,0);
  const empty=new Set();
  for(let r=0;r<t.rows;r++)for(let c=0;c<t.cols;c++){
    const d=g.getImageData(c*t.tw,r*t.th,t.tw,t.th).data; let any=false;
    for(let i=3;i<d.length;i+=4){if(d[i]>8){any=true;break;}}
    if(!any)empty.add(r*t.cols+c);
  }
  t.empty=empty;
}
// 把"挨在一起的非空格"识别成一整块对象(连通域)。点一下就能选整块。
function computeObjects(t){
  const seen=new Set(),objs=[],cellObj=new Map();
  const id=(c,r)=>r*t.cols+c;
  for(let r=0;r<t.rows;r++)for(let c=0;c<t.cols;c++){
    const k=id(c,r); if(t.empty.has(k)||seen.has(k))continue;
    let c0=c,r0=r,c1=c,r1=r;const q=[[c,r]],cells=[k];seen.add(k);
    while(q.length){const [cc,rr]=q.pop();
      c0=Math.min(c0,cc);r0=Math.min(r0,rr);c1=Math.max(c1,cc);r1=Math.max(r1,rr);
      for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){const nc=cc+dc,nr=rr+dr;
        if(nc<0||nr<0||nc>=t.cols||nr>=t.rows)continue;const nk=id(nc,nr);
        if(t.empty.has(nk)||seen.has(nk))continue;seen.add(nk);q.push([nc,nr]);cells.push(nk);}}
    const oi=objs.length;objs.push({c0,r0,c1,r1});cells.forEach(x=>cellObj.set(x,oi));
  }
  t.objects=objs;t.cellObj=cellObj;
  t.objectSheet=(objs.length>=3 && t.empty.size>t.cols*t.rows*0.2);  // 装饰物图:多块且空隙多
}
let cam={x:-40,y:-40,zoom:2};
const $=id=>document.getElementById(id);
function hint(t){const h=$("hint");h.textContent=t;h.classList.add("show");clearTimeout(h._t);h._t=setTimeout(()=>h.classList.remove("show"),1400);}

function resize(){DPR=Math.min(devicePixelRatio||1,2);cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cv.style.width=innerWidth+"px";cv.style.height=innerHeight+"px";}
addEventListener("resize",resize);resize();

function buildLayerTabs(){
  const el=$("layers");el.innerHTML="";
  LAYERS.forEach(l=>{const d=document.createElement("div");d.className="lt"+(l.id===curLayer?" active":"");
    d.textContent=l.name;d.onclick=()=>{curLayer=l.id;buildLayerTabs();refreshPalette();hint("当前层："+l.name);};el.appendChild(d);});
  const d=document.createElement("div");d.className="lt"+("marks"===curLayer?" active":"");
  d.textContent="🎯标记";d.onclick=()=>{curLayer="marks";buildLayerTabs();refreshPalette();hint("放主角/怪标记(单指放·🧽擦)");};el.appendChild(d);
}
// 当前层是标记 → 显示标记按钮调色板；否则显示瓦片集
function refreshPalette(){
  const isMark=curLayer==="marks";
  $("markWrap").style.display=isMark?"flex":"none";
  $("palCanvasWrap").style.display=(!isMark&&ts)?"inline-block":"none";
  $("palEmpty").style.display=(!isMark&&!ts)?"block":"none";
  if(isMark)buildMarkPalette();
}
function buildMarkPalette(){
  const w=$("markWrap");w.innerHTML="";
  MARKS.forEach(m=>{const b=document.createElement("button");
    b.className="markBtn"+(m.id===curMark?" on":"");
    b.innerHTML='<span class="dot" style="background:'+m.color+'">'+m.short+'</span>'+m.name;
    b.onclick=()=>{curMark=m.id;setMode("paint");buildMarkPalette();};
    w.appendChild(b);});
}
buildLayerTabs();

// ---- 坐标 ----
function tw(){return ts?ts.tw:16;} function th(){return ts?ts.th:16;}
function cellAt(sx,sy){return [Math.floor((sx/cam.zoom+cam.x)/tw()), Math.floor((sy/cam.zoom+cam.y)/th())];}

// ---- 渲染 ----
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const w=innerWidth,h=innerHeight;
  ctx.fillStyle="#0d1115";ctx.fillRect(0,0,w,h);
  const TW=tw(),TH=th();
  // 网格范围
  const c0=Math.floor(cam.x/TW)-1, r0=Math.floor(cam.y/TH)-1;
  const c1=c0+Math.ceil(w/(TW*cam.zoom))+3, r1=r0+Math.ceil(h/(TH*cam.zoom))+3;
  // 网格线
  ctx.strokeStyle="rgba(255,255,255,.06)";ctx.lineWidth=1;
  for(let c=c0;c<=c1;c++){const x=Math.round((c*TW-cam.x)*cam.zoom)+0.5;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let r=r0;r<=r1;r++){const y=Math.round((r*TH-cam.y)*cam.zoom)+0.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  // 原点
  const [ox,oy]=[Math.round((0-cam.x)*cam.zoom)+0.5,Math.round((0-cam.y)*cam.zoom)+0.5];
  ctx.strokeStyle="rgba(92,192,204,.5)";ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,h);ctx.moveTo(0,oy);ctx.lineTo(w,oy);ctx.stroke();
  // 地基线(整块对象底边吸到这里)
  const gy=Math.round(((groundRow+1)*TH-cam.y)*cam.zoom)+0.5;
  ctx.strokeStyle="rgba(255,210,74,.85)";ctx.lineWidth=2;ctx.setLineDash([10,7]);
  ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();ctx.setLineDash([]);ctx.lineWidth=1;
  // 瓦片(各层)
  if(ts){
    ctx.imageSmoothingEnabled=false;
    for(const l of LAYERS){
      const map=layers[l.id]; const alpha=(l.id===curLayer)?1:0.45;
      ctx.globalAlpha=alpha;
      for(const [key,idx] of map){
        const [c,r]=key.split(",").map(Number);
        if(c<c0||c>c1||r<r0||r>r1)continue;
        const sx=(idx%ts.cols)*TW, sy=Math.floor(idx/ts.cols)*TH;
        // 取整对齐：相邻格用同一条整数边界，消掉缩放时的 1px 缝/重叠
        const dx=Math.round((c*TW-cam.x)*cam.zoom), dy=Math.round((r*TH-cam.y)*cam.zoom);
        const dw=Math.round(((c+1)*TW-cam.x)*cam.zoom)-dx, dh=Math.round(((r+1)*TH-cam.y)*cam.zoom)-dy;
        ctx.drawImage(ts.img, sx,sy,TW,TH, dx,dy, dw,dh);
      }
    }
    ctx.globalAlpha=1;
  }
  drawMarks(TW,TH,c0,r0,c1,r1);
  requestAnimationFrame(draw);
}
// 画放置标记(圆点+字)。标记层非当前层时半透明。
function drawMarks(TW,TH,c0,r0,c1,r1){
  if(marks.size===0)return;
  ctx.globalAlpha=(curLayer==="marks")?1:0.55;
  for(const [key,mid] of marks){
    const a=key.split(",");const c=+a[0],r=+a[1];
    if(c<c0||c>c1||r<r0||r>r1)continue;
    const m=MARKS.find(x=>x.id===mid)||MARKS[0];
    const s=TW*cam.zoom;
    const cx=(c*TW-cam.x)*cam.zoom+s/2, cy=(r*TH-cam.y)*cam.zoom+s/2;
    const rad=Math.max(7,s*0.42);
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);
    ctx.fillStyle=m.color;ctx.fill();
    ctx.lineWidth=2;ctx.strokeStyle="rgba(0,0,0,.55)";ctx.stroke();
    ctx.fillStyle="#fff";ctx.font="bold "+Math.max(10,rad*1.1)+"px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(m.short,cx,cy+1);
  }
  ctx.globalAlpha=1;
}
requestAnimationFrame(draw);

// ---- 绘制操作 ----
let _undo=null;   // 本次手势第一次落笔写过的所有格(双指缩放时回退误画)
function paintAt(sx,sy){
  const [c,r]=cellAt(sx,sy);
  const key=c+","+r;
  const first=(_undo===null); if(first)_undo={cells:[]};
  const rec=(map,k)=>{ if(first)_undo.cells.push({map,key:k,prev:map.has(k)?map.get(k):undefined}); };
  if(curLayer==="marks"){   // 放/擦标记(不需要瓦片集)
    rec(marks,key);
    if(mode==="erase") marks.delete(key); else marks.set(key,curMark);
    return;
  }
  if(!ts)return;
  const map=layers[curLayer];
  if(mode==="erase"){ rec(map,key); map.delete(key); return; }
  // 整块对象：左右吸到"本块宽度"的网格(连摆不留缝)，底边吸到地基线；单格则跟光标
  const multi=(stamp.c1>stamp.c0||stamp.r1>stamp.r0);
  let objBottom=stamp.r0;
  for(let rr=stamp.r1;rr>=stamp.r0;rr--){let has=false;
    for(let cc=stamp.c0;cc<=stamp.c1;cc++){if(!ts.empty.has(rr*ts.cols+cc)){has=true;break;}}
    if(has){objBottom=rr;break;}}
  const W=stamp.c1-stamp.c0+1;
  const leftCol=multi?Math.round(c/W)*W:c;
  const botRow =multi?groundRow:r;
  for(let rr=stamp.r0;rr<=stamp.r1;rr++)for(let cc=stamp.c0;cc<=stamp.c1;cc++){
    const idx=rr*ts.cols+cc;
    if(ts.empty.has(idx))continue;
    const k2=(leftCol+(cc-stamp.c0))+","+(botRow+(rr-objBottom));
    rec(map,k2); map.set(k2,idx);
  }
}
function undoStray(){   // 还原刚才误落的那一笔(开始双指缩放时调用)
  if(_undo&&_undo.cells){for(let i=_undo.cells.length-1;i>=0;i--){const u=_undo.cells[i];
    if(u.prev===undefined)u.map.delete(u.key); else u.map.set(u.key,u.prev);}}
  _undo=null;
}

// ---- 指针 ----
const ptrs=new Map(); let pan=null,pinch=null,painting=false,spaceHeld=false;
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
cv.addEventListener("pointerdown",e=>{
  cv.setPointerCapture(e.pointerId); ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){
    undoStray();                       // 双指开始：回退刚才单指误画的那格
    painting=false; pan=null;
    const p=[...ptrs.values()];
    pinch={d:dist(p[0],p[1]),zoom:cam.zoom,cx:(p[0].x+p[1].x)/2,cy:(p[0].y+p[1].y)/2,camx:cam.x,camy:cam.y};
    return;
  }
  // 平移：Pan 模式 / 按住空格 / 中键 / 右键
  if(mode==="pan"||spaceHeld||e.button===1||e.button===2){
    pan={camx:cam.x,camy:cam.y,sx:e.clientX,sy:e.clientY}; painting=false;
  }else if(mode==="base"){const cr=cellAt(e.clientX,e.clientY);groundRow=cr[1];setMode("paint");hint("地基线已设(行 "+groundRow+")：放整块底边自动贴这条线");painting=false;}
  else{_undo=null;painting=true;paintAt(e.clientX,e.clientY);}
});
cv.addEventListener("pointermove",e=>{
  if(!ptrs.has(e.pointerId))return; ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinch&&ptrs.size>=2){
    const p=[...ptrs.values()];
    const nd=dist(p[0],p[1]);
    const nz=Math.max(minZoom(),Math.min(8,pinch.zoom*nd/pinch.d));
    const mx=(p[0].x+p[1].x)/2, my=(p[0].y+p[1].y)/2;          // 当前双指中点
    const wx=pinch.cx/pinch.zoom+pinch.camx, wy=pinch.cy/pinch.zoom+pinch.camy; // 起始中点下的世界点
    cam.zoom=nz; cam.x=wx-mx/nz; cam.y=wy-my/nz;               // 锚到当前中点 -> 缩放+平移都跟手
    return;
  }
  if(pan){cam.x=pan.camx-(e.clientX-pan.sx)/cam.zoom;cam.y=pan.camy-(e.clientY-pan.sy)/cam.zoom;return;}
  if(painting)paintAt(e.clientX,e.clientY);
});
function up(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinch=null;if(ptrs.size===0){pan=null;painting=false;_undo=null;}}
cv.addEventListener("pointerup",up);cv.addEventListener("pointercancel",up);
cv.addEventListener("wheel",e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;const nz=Math.max(minZoom(),Math.min(8,cam.zoom*f));
  const wx=e.clientX/cam.zoom+cam.x,wy=e.clientY/cam.zoom+cam.y;cam.zoom=nz;cam.x=wx-e.clientX/nz;cam.y=wy-e.clientY/nz;},{passive:false});

// 电脑端：空格按住=平移；右键拖也平移（屏蔽右键菜单）
addEventListener("keydown",e=>{
  if(e.code==="Space"&&!spaceHeld){spaceHeld=true;cv.style.cursor="grab";e.preventDefault();return;}
  if(e.key==="+"||e.key==="="||e.key==="-"||e.key==="_"){            // 键盘缩放(屏幕中心)
    const f=(e.key==="-"||e.key==="_")?0.9:1.1;
    const nz=Math.max(minZoom(),Math.min(8,cam.zoom*f));
    const mx=innerWidth/2,my=innerHeight/2;
    const wx=mx/cam.zoom+cam.x,wy=my/cam.zoom+cam.y;cam.zoom=nz;cam.x=wx-mx/nz;cam.y=wy-my/nz;
  }
});
addEventListener("keyup",e=>{if(e.code==="Space"){spaceHeld=false;cv.style.cursor="";}});
cv.addEventListener("contextmenu",e=>e.preventDefault());

// 底部素材面板：拖动顶部把手上拉/下拉调整高度
(function(){
  const pal=$("palette"),h=$("palHandle");let st=null;
  h.addEventListener("pointerdown",e=>{h.setPointerCapture(e.pointerId);st={y:e.clientY,h:pal.offsetHeight};e.preventDefault();});
  h.addEventListener("pointermove",e=>{if(!st)return;const nh=Math.max(70,Math.min(innerHeight*0.85,st.h+(st.y-e.clientY)));pal.style.height=nh+"px";});
  const end=()=>{st=null;};
  h.addEventListener("pointerup",end);h.addEventListener("pointercancel",end);
})();

// ---- 工具按钮 ----
function setMode(m){mode=m;$("btnPaint").classList.toggle("on",m==="paint");$("btnErase").classList.toggle("on",m==="erase");$("btnPan").classList.toggle("on",m==="pan");$("btnBase").classList.toggle("on",m==="base");}
$("btnBase").onclick=()=>{setMode("base");hint("点画布上你要的地面那一行,设成地基线(整块底边吸到这条线)");};
$("btnPaint").onclick=()=>setMode("paint");
$("btnErase").onclick=()=>setMode("erase");
$("btnPan").onclick=()=>setMode("pan");
$("btnMenu").onclick=()=>$("menu").classList.toggle("show");
function closeMenu(){$("menu").classList.remove("show");}

// ---- 瓦片集载入 ----
function openPanel(id){$("scrim").classList.add("show");$(id).classList.add("show");closeMenu();}
function closePanels(){$("scrim").classList.remove("show");document.querySelectorAll(".panel").forEach(p=>p.classList.remove("show"));}
$("scrim").onclick=closePanels;
$("mTileset").onclick=()=>{openPanel("tsPanel");loadBuiltinList();};
$("tsClose").onclick=closePanels;
async function loadBuiltinList(){
  const box=$("tsBuiltin");box.innerHTML='<span class="pill">加载中…</span>';
  try{const list=await (await fetch("../../assets/tilesets/tilesets.json?_="+Date.now())).json();
    box.innerHTML="";
    list.forEach(m=>{const b=document.createElement("button");b.className="btn";
      b.style.cssText="width:100%;margin:4px 0;text-align:left";b.textContent="🧩 "+m.name+"  ("+m.tile+"px)";
      b.onclick=()=>loadBuiltin(m);box.appendChild(b);});
  }catch(e){box.innerHTML='<span class="pill">(内置列表部署后生效)</span>';}
}
function loadBuiltin(m){
  const img=new Image();
  img.onload=()=>{const cols=Math.floor(img.width/m.tile),rows=Math.floor(img.height/m.tile);
    ts={img,tw:m.tile,th:m.tile,cols,rows,name:m.file};computeEmpty(ts);computeObjects(ts);stamp={c0:0,r0:0,c1:0,r1:0};curTile=0;buildPalette();closePanels();hint("内置："+m.name);};
  img.onerror=()=>hint("内置瓦片集加载失败(部署后再试)");
  img.src="../../assets/tilesets/"+m.file;
}
$("tsFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const tW=Math.max(1,parseInt($("tsW").value)||16), tH=Math.max(1,parseInt($("tsH").value)||16);
  const img=new Image();
  img.onload=()=>{
    const cols=Math.floor(img.width/tW), rows=Math.floor(img.height/tH);
    ts={img,tw:tW,th:tH,cols,rows,name:f.name};computeEmpty(ts);computeObjects(ts);stamp={c0:0,r0:0,c1:0,r1:0};
    curTile=0; buildPalette(); closePanels(); hint(`瓦片集 ${cols}×${rows} 已载入 · 调色板拖框=选整块`);
  };
  const fr=new FileReader();fr.onload=()=>img.src=fr.result;fr.readAsDataURL(f);
};

// ---- 调色板 ----
function buildPalette(){
  $("palEmpty").style.display="none"; $("palCanvasWrap").style.display="inline-block";
  const SC=Math.max(2,Math.floor(40/Math.max(ts.tw,ts.th)));   // 放大到 ~一格40px
  const pc=$("palCanvas"); pc.width=ts.cols*ts.tw*SC; pc.height=ts.rows*ts.th*SC;
  pc.style.width=(ts.cols*ts.tw*SC)+"px"; pc.style.height=(ts.rows*ts.th*SC)+"px";
  drawPalette(SC); pc._sc=SC;
  const cellOf=ev=>{const rect=pc.getBoundingClientRect();
    const px=(ev.clientX-rect.left)/SC, py=(ev.clientY-rect.top)/SC;
    return [Math.max(0,Math.min(ts.cols-1,Math.floor(px/ts.tw))), Math.max(0,Math.min(ts.rows-1,Math.floor(py/ts.th)))];};
  function setStamp(a,b){stamp={c0:Math.min(a[0],b[0]),r0:Math.min(a[1],b[1]),c1:Math.max(a[0],b[0]),r1:Math.max(a[1],b[1])};curTile=stamp.r0*ts.cols+stamp.c0;}
  let sel0=null,moved=false;
  pc.onpointerdown=ev=>{ev.preventDefault();pc.setPointerCapture(ev.pointerId);sel0=cellOf(ev);moved=false;setStamp(sel0,sel0);setMode("paint");drawPalette(SC);};
  pc.onpointermove=ev=>{if(!sel0)return;moved=true;setStamp(sel0,cellOf(ev));drawPalette(SC);};
  pc.onpointerup=ev=>{
    if(sel0&&!moved&&ts.objectSheet){   // 装饰物图:单点=自动选中整块
      const oi=ts.cellObj.get(sel0[1]*ts.cols+sel0[0]);
      if(oi!=null){const o=ts.objects[oi];setStamp([o.c0,o.r0],[o.c1,o.r1]);}
    }
    if(sel0){const n=(stamp.c1-stamp.c0+1)*(stamp.r1-stamp.r0+1);
      hint(n>1?("选中整块("+(stamp.c1-stamp.c0+1)+"×"+(stamp.r1-stamp.r0+1)+")→ 画布点地面那行,这块底边就贴上去"):"选 1 格");
      drawPalette(SC);}
    sel0=null;
  };
}
function drawPalette(SC){
  const pc=$("palCanvas"),g=pc.getContext("2d");g.imageSmoothingEnabled=false;
  g.clearRect(0,0,pc.width,pc.height);
  g.drawImage(ts.img,0,0,ts.img.width,ts.img.height,0,0,pc.width,pc.height);
  // 框选高亮
  const x=stamp.c0*ts.tw*SC, y=stamp.r0*ts.th*SC;
  const w=(stamp.c1-stamp.c0+1)*ts.tw*SC, h=(stamp.r1-stamp.r0+1)*ts.th*SC;
  g.fillStyle="rgba(255,210,74,.15)";g.fillRect(x,y,w,h);
  g.strokeStyle="#ffd24a";g.lineWidth=2;g.strokeRect(x+1,y+1,w-2,h-2);
}

// ---- 清空/导入导出 ----
$("mClear").onclick=()=>{if(confirm("清空当前层？")){if(curLayer==="marks")marks.clear();else layers[curLayer].clear();}closeMenu();};
function allBounds(){
  let minc=Infinity,minr=Infinity,maxc=-Infinity,maxr=-Infinity,any=false;
  for(const l of LAYERS)for(const k of layers[l.id].keys()){const a=k.split(",");const c=+a[0],r=+a[1];
    any=true;minc=Math.min(minc,c);minr=Math.min(minr,r);maxc=Math.max(maxc,c);maxr=Math.max(maxr,r);}
  return any?{minc,minr,maxc,maxr}:null;
}
function minZoom(){   // 动态缩放下限：随内容变大而变小，始终能缩到看全(再宽一点)
  const b=allBounds(); if(!b) return 0.2;
  const TW=tw(),TH=th();
  const w=(b.maxc-b.minc+1)*TW, h=(b.maxr-b.minr+1)*TH;
  const availH=Math.max(120,innerHeight-210);
  const fit=Math.min(innerWidth/w, availH/h);
  return Math.max(0.008, Math.min(0.5, fit*0.5));
}
$("mFit").onclick=()=>{closeMenu();const b=allBounds();const TW=tw(),TH=th();
  if(!b){cam={x:-40,y:-40,zoom:2};hint("还没画东西");return;}
  const x0=b.minc*TW,y0=b.minr*TH,w=(b.maxc-b.minc+1)*TW,h=(b.maxr-b.minr+1)*TH;
  const availH=Math.max(120,innerHeight-210);
  const z=Math.max(0.008,Math.min(8,Math.min(innerWidth/w,availH/h)*0.9));
  cam.zoom=z; cam.x=x0+w/2-(innerWidth/2)/z; cam.y=y0+h/2-(innerHeight*0.42)/z;
  hint("看全局："+(b.maxc-b.minc+1)+"×"+(b.maxr-b.minr+1)+" 格");};
$("mHome").onclick=()=>{closeMenu();cam={x:-40,y:-40,zoom:2};hint("回到原点");};
function marksOut(){
  const TW=tw(),TH=th();
  return Array.from(marks,([k,mid])=>{const a=k.split(",");const c=+a[0],r=+a[1];
    return {type:mid,col:c,row:r,x:c*TW+TW/2,y:(r+1)*TH};});  // x=格中心 y=格底(脚下)
}
$("mExport").onclick=()=>{
  if(!ts && marks.size===0){hint("先载入瓦片集");return;}
  // 计算世界范围
  let minc=Infinity,minr=Infinity,maxc=-Infinity,maxr=-Infinity;
  for(const l of LAYERS)for(const k of layers[l.id].keys()){const [c,r]=k.split(",").map(Number);minc=Math.min(minc,c);minr=Math.min(minr,r);maxc=Math.max(maxc,c);maxr=Math.max(maxr,r);}
  if(minc===Infinity){minc=minr=0;maxc=maxr=0;}
  const out={version:1,
    tileset:{image:ts.name,tile_w:ts.tw,tile_h:ts.th,columns:ts.cols},
    grid:{tile_w:ts.tw,tile_h:ts.th},
    bounds:{col0:minc,row0:minr,cols:maxc-minc+1,rows:maxr-minr+1},
    layers:LAYERS.map(l=>({name:l.id,solid:l.solid,tiles:Object.fromEntries(layers[l.id])})),
    markers:marksOut()};
  const blob=new Blob([JSON.stringify(out)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tilemap.json";a.click();closeMenu();
};
$("mImport").onclick=()=>{$("fileIn").click();closeMenu();};
$("fileIn").onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  try{const d=JSON.parse(await f.text());
    LAYERS.forEach(l=>layers[l.id]=new Map(Object.entries((d.layers.find(x=>x.name===l.id)||{tiles:{}}).tiles)));
    marks=new Map();(d.markers||[]).forEach(m=>marks.set(m.col+","+m.row,m.type));
    hint("已导入(注意:还需重新载入对应瓦片集图片)");
  }catch(err){hint("JSON 解析失败");}
};
hint("⋯ → 载入瓦片集 开始 · 单指画/擦 · 双指平移缩放");
</script>
